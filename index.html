<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>匡電気管理事務所株式会社 電気設備月次点検入力アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{overscroll-behavior:none;overflow:hidden}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;color:#111;font-size:14px;overscroll-behavior:none;overflow-x:hidden;touch-action:pan-y;position:fixed;width:100%;height:100%}
.app{overflow-y:auto;height:100vh;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.hdr{background:#1d3a6e;padding:10px 14px;position:sticky;top:0;z-index:40;color:#fff}
.hdr h1{font-size:13px;font-weight:700;line-height:1.4}
.hdr p{font-size:10px;opacity:.75;margin-top:2px}
.announce{background:#fff8dc;border-bottom:2px solid #f0c040;padding:8px 14px;font-size:12px;color:#7a5800;font-weight:500;line-height:1.5}
.login-overlay{position:fixed;inset:0;background:rgba(10,20,50,.75);z-index:100;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:28px 24px;width:320px;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-logo{font-size:13px;font-weight:700;color:#1d3a6e;line-height:1.5;margin-bottom:16px}
.login-logo span{display:block;font-size:11px;color:#888;font-weight:400;margin-top:2px}
.login-inp{width:100%;height:40px;border:1px solid #ddd;border-radius:8px;font-size:14px;padding:0 14px;outline:none;margin-bottom:10px;text-align:center}
.login-inp:focus{border-color:#1d3a6e}
.login-btn{width:100%;height:42px;border-radius:8px;border:none;background:#1d3a6e;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.login-err{font-size:11px;color:#c62828;min-height:16px;margin-top:6px}
.login-note{font-size:10px;color:#bbb;margin-top:12px;line-height:1.6}
.user-bar{background:#e8edf8;border-bottom:1px solid #c5cfe8;padding:5px 14px;display:flex;align-items:center;gap:8px;font-size:11px;color:#1d3a6e;font-weight:600}
.user-bar span{flex:1}
.logout-btn{font-size:11px;color:#888;cursor:pointer;background:none;border:none;padding:2px 8px;border-radius:4px}
.tabbar{background:#fff;border-bottom:1px solid #ddd;display:flex;overflow-x:auto;position:sticky;top:52px;z-index:39;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tbtn{flex-shrink:0;padding:8px 10px;font-size:11px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tbtn.active{color:#1d3a6e;border-bottom-color:#1d3a6e}
.tbtn.gtab.active{color:#e65100;border-bottom-color:#e65100}
.tbtn.stab.active{color:#f57f17;border-bottom-color:#f57f17}
.tbtn.ctab.active{color:#2e7d32;border-bottom-color:#2e7d32}
.tbtn.camtab.active{color:#6a1b9a;border-bottom-color:#6a1b9a}
.tbtn.btab.active{color:#00897b;border-bottom-color:#00897b}
.tadd.btadd{color:#00897b}
.tadd{flex-shrink:0;padding:5px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:2px solid transparent}
.tadd .ti{font-size:14px;line-height:1}
.tadd .tl{font-size:9px;font-weight:700}
.tab-close{margin-left:3px;font-size:10px;opacity:.4;cursor:pointer}
.page{display:none}.page.active{display:block}
.card{background:#fff;border-radius:12px;margin:8px 10px 0;border:1px solid #e8eaf0;overflow:hidden}
.card-hdr{padding:9px 12px;background:#f7f9fc;border-bottom:1px solid #e8eaf0;font-size:12px;font-weight:700;color:#555;display:flex;align-items:center;cursor:pointer;user-select:none}
.card-hdr .tog{margin-left:auto;color:#bbb;transition:transform .2s;font-size:13px}
.card-body.collapsed{display:none}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 10px 0}
.mi{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:8px 10px}
.mi label{font-size:11px;color:#888;display:block;margin-bottom:3px}
.mi input,.mi select{width:100%;height:30px;border:1px solid #ddd;border-radius:6px;background:#fafafa;font-size:13px;padding:0 8px;outline:none;-webkit-appearance:none;color:#111}
.mi input:focus,.mi select:focus{border-color:#1d3a6e}
.mi .av{height:30px;line-height:30px;font-size:13px;font-weight:600;color:#333;padding:0 4px}
.mf{grid-column:1/-1}
.frow{display:flex;gap:6px}
.frow input,.frow select{height:30px;border:1px solid #ddd;border-radius:6px;background:#fafafa;font-size:12px;padding:0 8px;outline:none;-webkit-appearance:none;color:#111}
.frow select{flex:0 0 auto;max-width:130px}
.frow input{flex:1}
.wrow{display:flex;gap:6px;align-items:center}
.wrow input{flex:1;height:30px;border:1px solid #ddd;border-radius:6px;background:#fafafa;font-size:13px;padding:0 8px;outline:none;-webkit-appearance:none}
.wrow button{height:30px;padding:0 10px;border:1px solid #ddd;border-radius:6px;background:#f0f4ff;color:#1d3a6e;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.jrow{display:flex;align-items:center;padding:7px 10px 7px 12px;border-bottom:1px solid #f0f0f0;gap:8px}
.jrow:last-child{border-bottom:none}
.jnum{font-size:11px;color:#bbb;min-width:20px;text-align:right;flex-shrink:0}
.jlabel{flex:1;font-size:12px;line-height:1.4;color:#222}
.jbtns{display:flex;gap:3px;flex-shrink:0}
.jbtn{width:34px;height:28px;border-radius:6px;border:1px solid #ddd;background:#f7f7f7;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;font-weight:600}
.jbtn.ok.on{background:#e6f4ea;border-color:#4caf50;color:#2e7d32}
.jbtn.warn.on{background:#fff3e0;border-color:#ff9800;color:#e65100}
.jbtn.na.on{background:#e3f2fd;border-color:#0288d1;color:#0277bd}
.bulk-bar{padding:6px 10px;display:flex;justify-content:flex-end;border-bottom:1px solid #f0f0f0;background:#f7fbf7}
.bulk-btn{height:28px;padding:0 14px;border-radius:6px;border:1px solid #4caf50;background:#e6f4ea;color:#2e7d32;font-size:11px;font-weight:700;cursor:pointer}
.mgl{padding:5px 12px 3px;font-size:11px;font-weight:700;color:#1d3a6e;background:#f0f4ff;border-bottom:1px solid #dde4f8;border-top:1px solid #dde4f8}
.mrow{display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid #f0f0f0;gap:8px;min-height:40px}
.mrow:last-child{border-bottom:none}
.mlabel{flex:1;font-size:12px;color:#333;white-space:nowrap}
.mhint{font-size:10px;color:#bbb;margin-top:1px}
.minp{height:30px;width:82px;border:1px solid #ddd;border-radius:6px;background:#fafafa;color:#111;font-size:13px;text-align:right;padding:0 6px;outline:none;flex-shrink:0}
.minp.is-dash{color:#0288d1;font-weight:700}
.minp:focus{border-color:#1d3a6e}
.minp.af{background:#f0f8e8;border-color:#a5d6a7;color:#2e7d32}
.minp.warn{border-color:#e65100!important;background:#fff8f0!important}
.munit{font-size:11px;color:#888;min-width:46px;flex-shrink:0}
.oxbtns{display:flex;gap:4px;flex-shrink:0}
.oxbtn{width:36px;height:30px;border-radius:6px;border:1px solid #ddd;background:#f7f7f7;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;font-weight:700}
.oxbtn.ok.on{background:#e6f4ea;border-color:#4caf50;color:#2e7d32}
.oxbtn.ng.on{background:#ffebee;border-color:#f44336;color:#c62828}
.sub-card{margin:4px 8px;border:1px solid #dde4f8;border-radius:8px;overflow:hidden}
.sub-hdr{display:flex;align-items:center;padding:6px 10px;background:#eef2ff;border-bottom:1px solid #dde4f8;gap:6px}
.sub-lbl{font-size:12px;font-weight:700;color:#1d3a6e;flex:1}
.sub-del{width:24px;height:24px;border-radius:5px;border:none;background:#ffe0e0;color:#c62828;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sel-row{display:flex;align-items:center;padding:6px 12px;border-bottom:1px solid #f0f0f0;gap:8px;background:#fffbf0}
.sel-row label{font-size:11px;color:#888;white-space:nowrap}
.sel-row select{flex:1;height:30px;border:1px solid #ddd;border-radius:6px;background:#fafafa;font-size:12px;padding:0 6px;outline:none;color:#333;font-weight:600}
.add-row{padding:8px 10px;display:flex;justify-content:center;border-top:1px solid #f0f0f0}
.btn-add{height:32px;padding:0 16px;border-radius:8px;border:1px dashed #1d3a6e;background:#f0f4ff;color:#1d3a6e;font-size:12px;font-weight:700;cursor:pointer}
.btn-add.org{border-color:#e65100;background:#fff3e0;color:#e65100}
.sbar{margin:8px 10px 0;background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.sc{text-align:center;min-width:40px}
.sc .n{font-size:18px;font-weight:700}
.sc .l{font-size:10px;color:#888;margin-top:1px}
.n-ok{color:#2e7d32}.n-w{color:#e65100}.n-na{color:#888}
.pb-wrap{flex:1}
.pb{height:4px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:4px}
.pb-fill{height:100%;background:#1d3a6e;border-radius:4px;transition:width .3s}
.pb-txt{font-size:10px;color:#888}
.notes-wrap{padding:8px 10px}
.notes-wrap label{font-size:11px;color:#888;display:block;margin-bottom:4px}
.notes-wrap textarea{width:100%;height:64px;border:1px solid #ddd;border-radius:6px;background:#fafafa;color:#111;font-size:12px;padding:6px 8px;resize:none;outline:none;font-family:inherit}
.hint-bar{padding:4px 12px;font-size:10px;color:#aaa;background:#fafafa;border-bottom:1px solid #f0f0f0}
/* 電卓 */
.calc-wrap{padding:12px 10px;max-width:340px;margin:0 auto}
.calc-disp{background:#1d3a6e;border-radius:10px;padding:14px 16px;margin-bottom:10px;text-align:right}
.calc-expr{font-size:11px;color:rgba(255,255,255,.5);min-height:16px;word-break:break-all}
.calc-val{font-size:28px;font-weight:700;color:#fff;margin-top:4px;word-break:break-all}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.calc-btn{height:56px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s}
.calc-btn:active{transform:scale(.93)}
.cb-n{background:#fff;color:#1d3a6e;border:1px solid #e0e0e0}
.cb-op{background:#e8edf8;color:#1d3a6e}
.cb-eq{background:#1d3a6e;color:#fff}
.cb-clr{background:#ffebee;color:#c62828}
.cb-fn{background:#f0f4ff;color:#1d3a6e;font-size:13px}
/* カメラ */
.cam-wrap{padding:10px}
.cam-bar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.cam-btn{height:36px;padding:0 14px;border-radius:8px;border:1px solid #ddd;background:#f0f4ff;color:#1d3a6e;font-size:12px;font-weight:600;cursor:pointer}
.cam-btn.red{background:#ffebee;border-color:#f44336;color:#c62828}
.cam-prev{width:100%;border-radius:10px;background:#111;min-height:200px;display:block;object-fit:cover}
.cam-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.cam-thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1}
.cam-thumb img{width:100%;height:100%;object-fit:cover}
.cam-tdel{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(200,40,40,.85);color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cam-empty{text-align:center;padding:20px;font-size:12px;color:#bbb}
/* ツールページ（電卓・カメラ・ストップウォッチ統合） */
.tool-subbar{display:flex;background:#fff;border-bottom:1px solid #e8eaf0;position:sticky;top:86px;z-index:30}
.tool-subbtn{flex:1;padding:10px 6px;text-align:center;font-size:12px;font-weight:700;color:#888;cursor:pointer;border-bottom:3px solid transparent}
.tool-subbtn.active{color:#1d3a6e;border-bottom-color:#1d3a6e;background:#f7f9fc}
.tool-pane{display:none}
.tool-pane.active{display:block}
/* ストップウォッチ */
.sw-wrap{padding:24px 16px;text-align:center}
.sw-display{font-size:48px;font-weight:700;color:#1d3a6e;font-variant-numeric:tabular-nums;letter-spacing:1px;margin-bottom:6px}
.sw-ms{font-size:20px;color:#888;font-variant-numeric:tabular-nums}
.sw-btns{display:flex;gap:12px;justify-content:center;margin-top:20px}
.sw-btn{width:84px;height:84px;border-radius:50%;border:none;font-size:14px;font-weight:700;cursor:pointer;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.sw-btn.start{background:#2e7d32}
.sw-btn.stop{background:#c62828}
.sw-btn.lap{background:#1d3a6e}
.sw-btn.reset{background:#888}
.sw-btn:disabled{opacity:.35;cursor:default}
.sw-laps{margin-top:20px;text-align:left;max-width:300px;margin-left:auto;margin-right:auto}
.sw-lap-row{display:flex;justify-content:space-between;padding:8px 12px;font-size:13px;border-bottom:1px solid #f0f0f0;color:#444}
.sw-lap-row .lap-num{color:#1d3a6e;font-weight:700}
/* 履歴 */
.hist-toolbar{padding:10px 14px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #e8eaf0;background:#fff}
.hist-toolbar span{flex:1;font-size:11px;color:#888;font-weight:600}
.hist-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.hist-item:hover{background:#f0f4ff}
.hist-name{font-size:12px;font-weight:600;color:#1d3a6e}
.hist-meta{font-size:11px;color:#888;margin-top:2px}
.hist-detail{display:none;margin:8px 0 4px;padding:10px;background:#f7f9fc;border-radius:8px;font-size:11px;color:#444;line-height:1.7;border:1px solid #e8eaf0}
.hist-detail.open{display:block}
.hist-empty{padding:16px;text-align:center;font-size:12px;color:#bbb}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:10px 12px;display:flex;gap:6px;max-width:480px;margin:0 auto;z-index:38}
.btn-prim{flex:1;height:42px;border-radius:8px;border:none;background:#1d3a6e;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.btn-prim:active{opacity:.85}
.btn-sec{height:42px;padding:0 12px;border-radius:8px;border:1px solid #ddd;background:#f7f7f7;color:#444;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:600}
.drive-st{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.drive-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.drive-dot.on{background:#4caf50}
.auto-badge{position:fixed;top:58px;right:12px;background:#4caf50;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;z-index:50;display:none}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-size:12px;display:none;z-index:200;max-width:340px;text-align:center;white-space:pre-line;line-height:1.5}
.toast.ok{background:#1d3a6e;color:#fff}
.toast.err{background:#c62828;color:#fff}
.toast.warn{background:#e65100;color:#fff}
/* カスタムテンキー */
.numpad-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.numpad-box{background:#f2f2f7;width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:10px 10px 24px;box-shadow:0 -4px 20px rgba(0,0,0,.2)}
.numpad-display{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:10px;min-height:52px;display:flex;flex-direction:column;justify-content:flex-end}
.numpad-label{font-size:11px;color:#888;margin-bottom:2px}
.numpad-val{font-size:28px;font-weight:600;color:#111;text-align:right;word-break:break-all}
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.npbtn{height:58px;border-radius:10px;border:none;font-size:22px;font-weight:500;cursor:pointer;transition:transform .1s;background:#fff;color:#111;box-shadow:0 2px 4px rgba(0,0,0,.1)}
.npbtn:active{transform:scale(.93);background:#e0e0e0}
.npbtn.np-action{background:#d1d5db;color:#111}
.npbtn.np-ok{background:#1d3a6e;color:#fff;font-size:18px}
.npbtn.np-minus{background:#e3f2fd;color:#0288d1;font-size:18px}
</style>
</head>

      <input class="login-inp" id="cp-user" type="text" placeholder="ユーザー名">
      <input class="login-inp" id="cp-old" type="password" placeholder="現在のパスワード">
      <input class="login-inp" id="cp-new1" type="password" placeholder="新しいパスワード">

function doLogin() {
  var user = document.getElementById('login-user').value.trim();
  var pass = document.getElementById('login-pass').value.trim();
  var errEl = document.getElementById('login-err');
  if (!user) { errEl.textContent = 'ユーザー名を入力してください'; return; }
  if (!pass) { errEl.textContent = 'パスワードを入力してください'; return; }
  errEl.textContent = '確認中...';
  if (GAS_URL.indexOf('YOUR_SCRIPT_ID') >= 0) {
    errEl.textContent = '※ デモモード';
    setTimeout(function() { loginSuccess(user); }, 400);
    return;
  }
  fetch(GAS_URL + '?action=auth&user=' + encodeURIComponent(user) + '&pass=' + encodeURIComponent(pass))
    .then(function(r) { return r.json(); })
    .then(function(j) {
      if (j.ok) {
        loginSuccess(user);
      } else {
        errEl.textContent = '⛔ ' + (j.message || 'ユーザー名またはパスワードが違います');
      }
    })
    .catch(function(err) {
      console.warn('GAS auth error:', err);
      errEl.textContent = 'GAS通信エラー。再度お試しください';
    });
}
function loginSuccess(user) {
  currentUser = user;
  saveSession(user); // リフレッシュ時に復元するためセッションに保存
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('footer').style.display = 'flex';
  document.getElementById('hdr-sub').textContent = dateStr;
  document.getElementById('user-disp').textContent = '👤 ' + user;
  renderTabs();
  // GAS設定済みならDrive状態を接続中に表示
  if (GAS_URL.indexOf('YOUR_SCRIPT_ID') < 0) { gasConnected = true; updateDriveSt(true); }
  loadAnnounce(); // 今月の注意事項をスプレッドシートから取得
  // 事業所リストをGASから取得してからページ構築
  loadUserFacilities(function() {
    addToolPage();
    addElecPage(); // 最後に追加→電気室タブが最初に表示
  });
  setInterval(function() { if (unsaved) autoSave(); }, 120000);
  handleOAuth();
}

  clearSession();
  location.reload();
}

function doChangePass() {
  var user  = document.getElementById('cp-user').value.trim();
  var old   = document.getElementById('cp-old').value.trim();
  var new1  = document.getElementById('cp-new1').value.trim();
  var new2  = document.getElementById('cp-new2').value.trim();
  var errEl = document.getElementById('cp-err');
  if (!user || !old || !new1 || !new2) { errEl.textContent = 'すべて入力してください'; return; }
  if (new1 !== new2) { errEl.textContent = '新しいパスワードが一致しません'; return; }
  if (new1.length < 4) { errEl.textContent = 'パスワードは4文字以上にしてください'; return; }
  errEl.textContent = '変更中...';
  fetch(GAS_URL + '?action=changePass&user=' + encodeURIComponent(user) +
    '&oldPass=' + encodeURIComponent(old) + '&newPass=' + encodeURIComponent(new1))
    .then(function(r) { return r.json(); })
    .then(function(j) {
      if (j.ok) {
        errEl.style.color = '#2e7d32';
        errEl.textContent = 'パスワードを変更しました';
        setTimeout(function() { errEl.style.color = ''; showLoginForm(); }, 1500);
      } else {
        errEl.textContent = j.message || '変更に失敗しました';
      }
    })
    .catch(function() { errEl.textContent = '通信エラーが発生しました'; });
}

function doResetPass() {
  var user  = document.getElementById('rp-user').value.trim();
  var errEl = document.getElementById('rp-err');
  if (!user) { errEl.textContent = 'ユーザー名を入力してください'; return; }
  errEl.textContent = '送信中...';
  fetch(GAS_URL + '?action=resetPass&user=' + encodeURIComponent(user))
    .then(function(r) { return r.json(); })
    .then(function(j) {
      if (j.ok) {
        errEl.style.color = '#2e7d32';
        errEl.textContent = j.message || '送信しました';
      } else {
        errEl.textContent = j.message || '送信に失敗しました';
      }
    })
    .catch(function() { errEl.textContent = '通信エラーが発生しました'; });
}

function loadUserFacilities(callback) {
  if (GAS_URL.indexOf('YOUR_SCRIPT_ID') >= 0) {
    userFacilities = USER_FACILITIES['__default__'] || [];
    if (callback) callback();
    return;
  }
  // タイムアウト付きfetch（8秒で諦めて直接入力モードに）
  var done = false;
  var timer = setTimeout(function() {
    if (!done) {
      done = true;
      userFacilities = [];
      console.warn('getUserInfo timeout');
      if (callback) callback();
    }
  }, 8000);

  fetch(GAS_URL + '?action=getUserInfo&user=' + encodeURIComponent(currentUser))
    .then(function(r) { return r.json(); })
    .then(function(j) {
      if (done) return;
      clearTimeout(timer); done = true;
      if (j.ok && j.facilities && j.facilities.length) {
        userFacilities = j.facilities;
      } else {
        userFacilities = [];
        console.warn('getUserInfo: no facilities', j);
      }
      if (callback) callback();
    })
    .catch(function(e) {
      if (done) return;
      clearTimeout(timer); done = true;
      userFacilities = [];
      console.warn('getUserInfo fetch error:', e);
      if (callback) callback();
    });
}

function renderTabs() {
  var bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  function mkTab(p, cls) {
    var d = document.createElement('div');
    d.className = 'tbtn ' + cls + (activeTab === p.id ? ' active' : '');
    d.id = 'tab-' + p.id;
    d.innerHTML = p.label + '<span class="tab-close" onclick="event.stopPropagation();removePage(\'' + p.id + '\')">✕</span>';
    d.onclick = function() { switchTab(p.id); };
    bar.appendChild(d);
  }
  function mkAdd(icon, label, cls, fn) {
    var d = document.createElement('div');
    d.className = 'tadd ' + cls;
    d.innerHTML = '<span class="ti">＋' + icon + '</span><span class="tl">' + label + '</span>';
    d.onclick = fn;
    bar.appendChild(d);
  }
  elecPages.forEach(function(p) { mkTab(p, ''); });
  mkAdd('⚡', '電気室', 'etadd', addElecPage);
  genPages.forEach(function(p) { mkTab(p, 'gtab'); });
  mkAdd('🔥', '発電機', 'gtadd', addGenPage);
  solarPages.forEach(function(p) { mkTab(p, 'stab'); });
  mkAdd('☀️', '太陽光', 'stadd', addSolarPage);
  battPages.forEach(function(p) { mkTab(p, 'btab'); });
  mkAdd('🔋', '蓄電池', 'btadd', addBattPage);
  toolPages.forEach(function(p) {
    var d = document.createElement('div');
    d.className = 'tbtn ctab' + (activeTab === p.id ? ' active' : '');
    d.id = 'tab-' + p.id;
    d.textContent = '🛠 ' + p.label;
    d.onclick = function() { switchTab(p.id); };
    bar.appendChild(d);
  });
  var htab = document.createElement('div');
  htab.className = 'tbtn' + (activeTab === 'hist' ? ' active' : '');
  htab.id = 'tab-hist';
  htab.textContent = '📋 履歴';
  htab.onclick = function() { showHistory(); };
  bar.appendChild(htab);
}
function switchTab(pid) {
  activeTab = pid;
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  var el = document.getElementById('page-' + pid);
  if (el) el.classList.add('active');
  document.querySelectorAll('.tbtn,.tadd').forEach(function(t) { t.classList.remove('active'); });
  var tb = document.getElementById('tab-' + pid);
  if (tb) tb.classList.add('active');
  // 履歴はshowHistory()で制御
}

// ===== 気温・湿度自動取得 =====
function getWeather(pid) {
  if (!navigator.geolocation) { showToast('位置情報が使えません', 'warn'); return; }
  showToast('位置情報を取得中...', 'ok');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude, lon = pos.coords.longitude;
      fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,relativehumidity_2m&timezone=Asia%2FTokyo')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var temp = data.current.temperature_2m;
          var hum = data.current.relativehumidity_2m;
          var ti = document.getElementById(pid + '-temp');
          var hi = document.getElementById(pid + '-hum');
          if (ti) { ti.value = temp; ti.classList.add('af'); ti.classList.remove('is-dash'); }
          if (hi) { hi.value = hum; hi.classList.add('af'); hi.classList.remove('is-dash'); }
          markUnsaved();
          showToast('気温: ' + temp + '°C　湿度: ' + hum + '%', 'ok');
        })
        .catch(function() { showToast('気温・湿度の取得に失敗しました', 'err'); });
    },
    function(err) {
      var msg = '位置情報の取得に失敗しました';
      if (err.code === 1) msg = '位置情報の使用が許可されていません\n設定→Safari→位置情報を確認してください';
      else if (err.code === 2) msg = '位置情報を取得できませんでした';
      else if (err.code === 3) msg = '位置情報の取得がタイムアウトしました';
      showToast(msg, 'err');
    },
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
  );
}

// ===== 電力自動計算 =====
function calcPower(pid) {
  var vr = parseFloat(document.getElementById(pid + '-vr') ? document.getElementById(pid + '-vr').value : '');
  var ar = parseFloat(document.getElementById(pid + '-ar') ? document.getElementById(pid + '-ar').value : '');
  var pe = document.getElementById(pid + '-power');
  if (pe && !isNaN(vr) && !isNaN(ar)) {
    pe.value = (vr * ar * Math.sqrt(3)).toFixed(2);
    pe.classList.add('af');
  } else if (pe) { pe.value = '-'; }
}

}

// ===== 判定 =====
function setJ(btn, val, type) {
  var grp = btn.closest('.jbtns');
  var pid = grp.dataset.pid;
  var key = grp.dataset.key;
  var pg;
  if (type === 'e') pg = elecPages.find(function(p) { return p.id === pid; });
  else if (type === 'g') pg = genPages.find(function(p) { return p.id === pid; });
  else pg = solarPages.find(function(p) { return p.id === pid; });
  if (!pg) return;
  grp.querySelectorAll('.jbtn').forEach(function(b) { b.classList.remove('on'); });
  if (pg.jState[key] === val) { delete pg.jState[key]; } else { pg.jState[key] = val; btn.classList.add('on'); }
  updateSBar(pid, type);
  markUnsaved();
}
function updateSBar(pid, type) {
  var items = type === 'e' ? ELEC_ITEMS : type === 'g' ? GEN_ITEMS : SOLAR_ITEMS;
  var pg;
  if (type === 'e') pg = elecPages.find(function(p) { return p.id === pid; });
  else if (type === 'g') pg = genPages.find(function(p) { return p.id === pid; });
  else pg = solarPages.find(function(p) { return p.id === pid; });
  if (!pg) return;
  var keys = Object.keys(pg.jState);
  var ok = keys.filter(function(k) { return pg.jState[k] === 'ok'; }).length;
  var w = keys.filter(function(k) { return pg.jState[k] === 'warn'; }).length;
  var na = keys.filter(function(k) { return pg.jState[k] === 'na'; }).length;
  function s(id, v) { var e = document.getElementById(id); if (e) e.textContent = v; }
  s(pid + '-cnt-ok', ok); s(pid + '-cnt-w', w); s(pid + '-cnt-na', na);
  var pb = document.getElementById(pid + '-pb');
  if (pb) pb.style.width = Math.round(keys.length / items.length * 100) + '%';
  var pt = document.getElementById(pid + '-pb-txt');
  if (pt) pt.textContent = keys.length + ' / ' + items.length;
}
function bulkOk(pid, type) {
  var items = type === 'e' ? ELEC_ITEMS : type === 'g' ? GEN_ITEMS : SOLAR_ITEMS;
  var lbl = type === 'e' ? '電気室' : type === 'g' ? '発電機' : '太陽光';
  if (!confirm('【確認1/2】「' + lbl + '」全' + items.length + '項目を\n「〇 良好」にします。よろしいですか？')) return;
  if (!confirm('【確認2/2】本当にすべて「〇 良好」に\n設定しますか？')) return;
  var pg;
  if (type === 'e') pg = elecPages.find(function(p) { return p.id === pid; });
  else if (type === 'g') pg = genPages.find(function(p) { return p.id === pid; });
  else pg = solarPages.find(function(p) { return p.id === pid; });
  if (!pg) return;
  items.forEach(function(_, i) { pg.jState[i] = 'ok'; });
  document.querySelectorAll('#page-' + pid + ' .jbtns').forEach(function(grp) {
    grp.querySelectorAll('.jbtn').forEach(function(b) { b.classList.remove('on'); });
    var okBtn = grp.querySelector('.jbtn.ok');
    if (okBtn) okBtn.classList.add('on');
  });
  updateSBar(pid, type);
  markUnsaved();
  showToast('すべて「〇 良好」に設定しました', 'ok');
}

function calcPaneHtml(pid) {
  return '<div class="calc-wrap">' +
    '<div class="calc-disp"><div class="calc-expr" id="' + pid + '-expr"></div><div class="calc-val" id="' + pid + '-val">0</div></div>' +
    '<div class="calc-grid">' +
    mkCB('AC','cb-clr','calcAC(\''+pid+'\')')+mkCB('+/−','cb-fn','calcSign(\''+pid+'\')')+mkCB('%','cb-fn','calcPct(\''+pid+'\')')+mkCB('÷','cb-op','calcOp(\''+pid+'\',\'/\')')+
    mkCB('7','cb-n','calcNum(\''+pid+'\',7)')+mkCB('8','cb-n','calcNum(\''+pid+'\',8)')+mkCB('9','cb-n','calcNum(\''+pid+'\',9)')+mkCB('×','cb-op','calcOp(\''+pid+'\',\'*\')')+
    mkCB('4','cb-n','calcNum(\''+pid+'\',4)')+mkCB('5','cb-n','calcNum(\''+pid+'\',5)')+mkCB('6','cb-n','calcNum(\''+pid+'\',6)')+mkCB('−','cb-op','calcOp(\''+pid+'\',\'-\')')+
    mkCB('1','cb-n','calcNum(\''+pid+'\',1)')+mkCB('2','cb-n','calcNum(\''+pid+'\',2)')+mkCB('3','cb-n','calcNum(\''+pid+'\',3)')+mkCB('＋','cb-op','calcOp(\''+pid+'\',\'+\')')+
    '<button class="calc-btn cb-n" style="grid-column:span 2" onclick="calcNum(\''+pid+'\',0)">0</button>'+mkCB('.','cb-fn','calcDot(\''+pid+'\')')+mkCB('＝','cb-eq','calcEq(\''+pid+'\')')+
    '</div></div>';
}
function mkCB(lbl, cls, onclick) {
  return '<button class="calc-btn ' + cls + '" onclick="' + onclick + '">' + lbl + '</button>';
}
function cs(pid) { return document.getElementById('page-' + pid)._cs; }
function cd(pid) {
  var s = cs(pid);
  document.getElementById(pid + '-val').textContent = s.cur;
  document.getElementById(pid + '-expr').textContent = s.expr;
}
function calcNum(pid, n) { var s=cs(pid); s.cur=(s.reset||s.cur==='0')?String(n):s.cur+n; s.reset=false; cd(pid); }
function calcDot(pid) { var s=cs(pid); if(s.cur.indexOf('.')<0)s.cur+='.'; s.reset=false; cd(pid); }
function calcOp(pid, op) {
  var s=cs(pid);
  if(s.op&&!s.reset){var r=evalOp(parseFloat(s.prev),parseFloat(s.cur),s.op);s.cur=String(r);s.expr=r+' '+opSym(op);}
  else{s.expr=s.cur+' '+opSym(op);}
  s.prev=s.cur;s.op=op;s.reset=true;cd(pid);
}
function calcEq(pid) {
  var s=cs(pid);if(!s.op)return;
  var r=evalOp(parseFloat(s.prev),parseFloat(s.cur),s.op);
  s.expr=s.prev+' '+opSym(s.op)+' '+s.cur+' =';s.cur=String(r);s.op=null;s.prev=null;s.reset=true;cd(pid);
}
function calcAC(pid){var s=cs(pid);s.cur='0';s.op=null;s.prev=null;s.reset=false;s.expr='';cd(pid);}
function calcSign(pid){var s=cs(pid);s.cur=String(-parseFloat(s.cur));cd(pid);}
function calcPct(pid){var s=cs(pid);s.cur=String(parseFloat(s.cur)/100);cd(pid);}
function evalOp(a,b,op){if(op==='/') return b!==0?a/b:0;if(op==='*')return a*b;if(op==='+')return a+b;return a-b;}
function opSym(op){if(op==='/')return '÷';if(op==='*')return '×';if(op==='-')return '−';return '＋';}

// --- カメラ ---
function camPaneHtml(pid) {
  return '<div class="cam-wrap">' +
    '<div class="cam-bar">' +
      '<button class="cam-btn" onclick="startCam(\''+pid+'\')">📷 カメラ起動</button>' +
      '<button class="cam-btn" onclick="takePhoto(\''+pid+'\')">🔴 撮影</button>' +
      '<button class="cam-btn red" onclick="stopCam(\''+pid+'\')">■ 停止</button>' +
    '</div>' +
    '<video id="' + pid + '-video" class="cam-prev" autoplay playsinline style="display:none"></video>' +
    '<div id="' + pid + '-gallery" class="cam-gallery"><div class="cam-empty">撮影した写真がここに表示されます</div></div>' +
    '</div>';
}
function startCam(pid) {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(function(stream) {
      camStreams[pid] = stream;
      var v = document.getElementById(pid + '-video');
      v.srcObject = stream; v.style.display = 'block';
      showToast('カメラ起動しました', 'ok');
    })
    .catch(function() { showToast('カメラの起動に失敗しました\n設定でカメラを許可してください', 'err'); });
}
function stopCam(pid) {
  if (camStreams[pid]) { camStreams[pid].getTracks().forEach(function(t) { t.stop(); }); delete camStreams[pid]; }
  var v = document.getElementById(pid + '-video');
  if (v) { v.style.display = 'none'; v.srcObject = null; }
}
function takePhoto(pid) {
  var v = document.getElementById(pid + '-video');
  if (!v || !camStreams[pid]) { showToast('先にカメラを起動してください', 'warn'); return; }
  var canvas = document.createElement('canvas');
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  canvas.getContext('2d').drawImage(v, 0, 0);
  var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  // メモリに追加（保存は💾ボタン押下時）
  camPhotos[pid].push({ dataUrl: dataUrl, saved: false });
  renderGallery(pid);
  markUnsaved();
  showToast('撮影しました（💾保存で端末・Driveに保存）', 'ok');
}
function renderGallery(pid) {
  var g = document.getElementById(pid + '-gallery');
  if (!g) return;
  var photos = camPhotos[pid] || [];
  if (!photos.length) { g.innerHTML = '<div class="cam-empty">撮影した写真がここに表示されます<br><span style="font-size:10px;color:#aaa">💾 保存ボタンで端末・Driveに保存されます</span></div>'; return; }
  g.innerHTML = '';

// --- ストップウォッチ ---
function swPaneHtml(pid) {
  return '<div class="sw-wrap">' +
    '<div class="sw-display" id="' + pid + '-sw-time">00:00</div>' +
    '<div class="sw-ms" id="' + pid + '-sw-ms">.00</div>' +
    '<div class="sw-btns">' +
      '<button class="sw-btn reset" id="' + pid + '-sw-reset" onclick="swReset(\''+pid+'\')" disabled>リセット</button>' +
      '<button class="sw-btn start" id="' + pid + '-sw-start" onclick="swStart(\''+pid+'\')">開始</button>' +
      '<button class="sw-btn lap" id="' + pid + '-sw-lap" onclick="swLap(\''+pid+'\')" disabled>ラップ</button>' +
    '</div>' +
    '<div class="sw-laps" id="' + pid + '-sw-laps"></div>' +
    '</div>';
}
function swFormat(ms) {
  var totalSec = Math.floor(ms / 1000);
  var mm = String(Math.floor(totalSec / 60));
  if (mm.length < 2) mm = '0' + mm;
  var ss = String(totalSec % 60);
  if (ss.length < 2) ss = '0' + ss;
  var cs2 = String(Math.floor((ms % 1000) / 10));
  if (cs2.length < 2) cs2 = '0' + cs2;
  return { main: mm + ':' + ss, ms: '.' + cs2 };
}
function swTick(pid) {
  var st = swState[pid]; if (!st || !st.running) return;
  var now = Date.now();
  var elapsed = st.elapsed + (now - st.startTs);
  var f = swFormat(elapsed);
  var te = document.getElementById(pid + '-sw-time');
  var me = document.getElementById(pid + '-sw-ms');
  if (te) te.textContent = f.main;
  if (me) me.textContent = f.ms;
}
function swStart(pid) {
  var st = swState[pid]; if (!st) return;
  if (st.running) return;
  st.running = true;
  st.startTs = Date.now();
  st.timer = setInterval(function() { swTick(pid); }, 30);
  var startBtn = document.getElementById(pid + '-sw-start');
  var lapBtn = document.getElementById(pid + '-sw-lap');
  var resetBtn = document.getElementById(pid + '-sw-reset');
  if (startBtn) { startBtn.textContent = '停止'; startBtn.className = 'sw-btn stop'; startBtn.onclick = function() { swStop(pid); }; }
  if (lapBtn) lapBtn.disabled = false;
  if (resetBtn) resetBtn.disabled = true;
}
function swStop(pid) {
  var st = swState[pid]; if (!st || !st.running) return;
  st.elapsed += Date.now() - st.startTs;
  st.running = false;
  if (st.timer) { clearInterval(st.timer); st.timer = null; }
  var startBtn = document.getElementById(pid + '-sw-start');
  var lapBtn = document.getElementById(pid + '-sw-lap');
  var resetBtn = document.getElementById(pid + '-sw-reset');
  if (startBtn) { startBtn.textContent = '再開'; startBtn.className = 'sw-btn start'; startBtn.onclick = function() { swStart(pid); }; }
  if (lapBtn) lapBtn.disabled = true;
  if (resetBtn) resetBtn.disabled = false;
}
function swReset(pid) {
  var st = swState[pid]; if (!st) return;
  st.elapsed = 0; st.laps = [];
  var te = document.getElementById(pid + '-sw-time');
  var me = document.getElementById(pid + '-sw-ms');
  if (te) te.textContent = '00:00';
  if (me) me.textContent = '.00';
  var lapsEl = document.getElementById(pid + '-sw-laps');
  if (lapsEl) lapsEl.innerHTML = '';
  var resetBtn = document.getElementById(pid + '-sw-reset');
  if (resetBtn) resetBtn.disabled = true;
}
function swLap(pid) {
  var st = swState[pid]; if (!st || !st.running) return;
  var elapsed = st.elapsed + (Date.now() - st.startTs);
  st.laps.push(elapsed);
  var lapsEl = document.getElementById(pid + '-sw-laps');
  if (!lapsEl) return;
  var f = swFormat(elapsed);
  var row = document.createElement('div');
  row.className = 'sw-lap-row';
  row.innerHTML = '<span class="lap-num">ラップ ' + st.laps.length + '</span><span>' + f.main + f.ms + '</span>';
  lapsEl.insertBefore(row, lapsEl.firstChild);
}

function csvEscape(str) {
  // CSV用エスケープ：ダブルクォート・カンマ・改行を含む場合はダブルクォートで囲む
  var s = String(str || '').replace(/"/g, '""');
  if (s.indexOf(',') >= 0 || s.indexOf('\n') >= 0 || s.indexOf('"') >= 0) {
    s = '"' + s + '"';
  }
  return s;
}
function buildCSV(d) {

  csv += '点検日,' + d.date + '\n点検者,' + d.inspector + '\n\n';
  d.elec.forEach(function(pg) {

      pg.transformers.forEach(function(t) { csv += t.label+','+t.use+','+t.vr+','+t.vs+','+t.vt+','+t.ar+','+t.as+','+t.at+','+t.tp+','+t.lk+'\n'; });

    }
    csv += '\n高圧機器\n種別,温度(℃)\n';
    pg.kiki.forEach(function(k) { csv += k.type + ',' + k.tmp + '\n'; });
    csv += '\n記事欄\n' + csvEscape(pg.notes) + '\n\n';
  });
  d.batt.forEach(function(pg) {
    csv += '【' + pg.label + '】設備名: ' + pg.name + '\n\n';
    csv += 'セル,温度(℃),比重,電圧(V)\n';

    csv += '\n記事欄\n' + csvEscape(pg.notes) + '\n\n';
  });
  return { csv: csv, fname: fname };
}

function confirmSave() {
  var warns = checkMissing();
  var d = collectAll();
  var summary = '点検日: ' + d.date + '\n点検者: ' + d.inspector + '\n事業所: ' + d.facilityName + '\n電気室: ' + d.elec.length + '件  発電機: ' + d.gen.length + '件  太陽光: ' + d.solar.length + '件';
  if (warns.length > 0) {
    var wmsg = '未入力の警告 (' + warns.length + '件)\n\n' + warns.slice(0, 5).join('\n') + (warns.length > 5 ? '\n...他' + (warns.length - 5) + '件' : '') + '\n\nそのまま保存しますか？';
    if (!confirm(wmsg)) return;
  }
  if (!confirm('【確認1/2】以下の内容を保存します。\n\n' + summary + '\n\nよろしいですか？')) return;
  if (!confirm('【確認2/2】Google DriveにCSVを保存して\nダウンロードします。実行しますか？')) return;
  saveAll(d);
}
function saveAll(d) {
  if (!d) d = collectAll();
  var key = 'tenken-' + dateKey;
  var built = buildCSV(d);
  var csv = built.csv, fname = built.fname;
  try {
    var hist = [];
    var r = store_get('tenken-history');
    if (r) { try { hist = JSON.parse(r.value); } catch(e) {} }
    var entry = { key:key, date:dateStr, inspector:d.inspector, facility:d.facilityName, savedAt:d.savedAt, summary:d.elec.map(function(p){ return '◆' + p.label + ' ' + p.facility; }).join('\n') };
    hist = hist.filter(function(h) { return h.key !== key; });
    hist.unshift(entry);
    if (hist.length > 30) hist = hist.slice(0, 30);
    store_set('tenken-history', JSON.stringify(hist));
    store_set(key, JSON.stringify(d));
    unsaved = false;
  } catch(e) { showToast('ローカル保存エラー', 'err'); return; }
  // 写真を端末（localStorage）に保存
  if (d.photos && d.photos.length > 0) {
    try {
      var photoKey = 'photos-' + dateKey;
      var photoArr = d.photos.map(function(p) { return p.dataUrl; });
      store_set(photoKey, JSON.stringify(photoArr));
      // 端末ダウンロード
      d.photos.forEach(function(p, i) {
        var now = new Date();
        var pname = dateKey + '_photo' + (i+1) + '_' + currentUser + '.jpg';
        var pblob = dataUrlToBlob(p.dataUrl);
        var purl = URL.createObjectURL(pblob);
        var pa = document.createElement('a'); pa.href = purl; pa.download = pname; pa.click();
        URL.revokeObjectURL(purl);
      });
    } catch(e) { console.warn('photo local save error:', e); }
  }

  // Drive保存（GAS経由・デフォルト）
  showToast('Driveに保存中...', 'ok');
  saveToDrive(csv, fname).then(function(ok) {
    if (ok) {
      // Drive保存成功：CSVもダウンロード＋写真保存
      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = fname; a.click(); URL.revokeObjectURL(url);
      savePhotosToDrive(d.photos, dateKey);
      showToast('Drive保存&CSV完了！', 'ok');
    } else {
      // Drive保存失敗：端末保存を確認
      if (confirm('クラウド（Drive）への保存に失敗しました。\n端末（ローカル）に保存しますか？')) {
        saveToLocal(csv, fname, d);
        showToast('端末に保存しました（後でDriveに再送してください）', 'warn');
      } else {
        showToast('保存をキャンセルしました', 'warn');
      }
    }
  }).catch(function(e) {
    console.error('saveToDrive catch:', e);
    if (confirm('クラウドへの接続に失敗しました。\n端末（ローカル）に保存しますか？')) {
      saveToLocal(csv, fname, d);
      showToast('端末に保存しました', 'warn');
    } else {
      showToast('保存をキャンセルしました', 'warn');
    }
  });
}

// dataURL → Blob変換
function dataUrlToBlob(dataUrl) {
  var arr = dataUrl.split(',');
  var mime = arr[0].match(/:(.*?);/)[1];
  var bstr = atob(arr[1]);
  var n = bstr.length;
  var u8arr = new Uint8Array(n);
  while (n--) u8arr[n] = bstr.charCodeAt(n);
  return new Blob([u8arr], { type: mime });
}

function detRow(label, val, unit) {

    '<span style="flex:1;font-size:11px;color:#666">' + escHtml(label) + '</span>' +
    '<span style="font-size:12px;color:#222;font-weight:500">' + escHtml(val) + ' <span style="font-size:10px;color:#888">' + escHtml(unit) + '</span></span>' +

function renderDriveList(files, targetUser) {
  var list = document.getElementById('hist-list');
  if (!list) return;
  var header = document.createElement('div');
  header.style.cssText = 'padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e8eaf0';
  header.innerHTML = '<span style="font-size:10px;color:#aaa;flex:1">Google Drive（' + files.length + '件）</span>' +
    '<button onclick="showUserSelector()" style="height:26px;padding:0 10px;border-radius:6px;border:1px solid #1d3a6e;background:#f0f4ff;color:#1d3a6e;font-size:10px;font-weight:700;cursor:pointer">👥 ユーザー切替</button>';
  list.innerHTML = '';
  list.appendChild(header);
  if (!files.length) {
    var empty = document.createElement('div'); empty.className = 'hist-empty';
    empty.textContent = 'このフォルダにデータがありません';
    list.appendChild(empty); return;
  }
  files.forEach(function(f) {
    var parts = f.name.replace('.csv', '').split('_');
    var raw = parts[0] || '';
    var date = raw.length === 8 ? raw.slice(0,4) + '年' + raw.slice(4,6) + '月' + raw.slice(6,8) + '日' : raw;
    var facility = parts[1] || ''; var inspector = parts[2] || '';
    var size = f.size ? Math.round(f.size / 1024) + 'KB' : '';
    var div = document.createElement('div'); div.className = 'hist-item';
    div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #f0f0f0';
    var info = document.createElement('div'); info.style.flex = '1';
    info.innerHTML = '<div class="hist-name">☁️ ' + (facility || f.name) + '</div>' +
      '<div class="hist-meta">' + date + (inspector ? ' ／ ' + inspector : '') + (size ? ' ／ ' + size : '') + '</div>';
    var delBtn = document.createElement('button');
    delBtn.style.cssText = 'width:32px;height:32px;border-radius:8px;border:none;background:#ffebee;color:#c62828;font-size:14px;cursor:pointer;flex-shrink:0';
    delBtn.textContent = '🗑';
    delBtn.title = '削除';
    (function(fid, fname, row) {
      info.style.cursor = 'pointer';
      info.onclick = function() { downloadDriveFile(fid, fname); };
      info.ontouchstart = function(e) { e.stopPropagation(); downloadDriveFile(fid, fname); };
      delBtn.onclick = function(e) {
        e.stopPropagation();
        if (!confirm('「' + fname + '」をDriveから削除しますか？')) return;
        fetch(GAS_URL + '?action=deleteFile&fileId=' + encodeURIComponent(fid))
          .then(function(r) { return r.json(); })
          .then(function(d) {
            if (d.ok) { row.remove(); showToast('削除しました', 'ok'); }
            else { showToast('削除失敗: ' + (d.message||''), 'err'); }
          })
          .catch(function() { showToast('削除に失敗しました', 'err'); });
      };
    })(f.id, f.name, div);
    div.appendChild(info); div.appendChild(delBtn);
    list.appendChild(div);
  });
}
function downloadDriveFile(fileId, fileName) {
  showToast('CSVを読み込み中...', 'ok');
  // GASのURLにリダイレクト追従オプションを追加
  fetch(GAS_URL + '?action=getFile&fileId=' + encodeURIComponent(fileId), {
    method: 'GET',
    redirect: 'follow'
  })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      if (!data.ok) { showToast('読み込み失敗: ' + (data.message||''), 'err'); return; }
      showCsvViewer(data.name || fileName, data.content || '');
    })
    .catch(function(e) {
      console.error('downloadDriveFile error:', e);
      showToast('Drive読込失敗\nGASの再デプロイを確認してください', 'err');
    });
}

function showCsvViewer(fileName, csvText, dataObj) {
  // BOMを除去
  var text = csvText.replace(/^\uFEFF/, '');
  var lines = text.split('\n');
  // 写真データ取得
  var photoArr = [];
  if (dataObj && dataObj.photos && dataObj.photos.length) {
    photoArr = dataObj.photos;
  } else {
    var dk = fileName ? fileName.slice(0,8) : '';
    var pr = dk ? store_get('photos-' + dk) : null;
    if (pr) { try { photoArr = JSON.parse(pr.value).map(function(s){ return { dataUrl: s }; }); } catch(e) {} }
  }
  // オーバーレイ表示
  var ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:10px';
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;width:96vw;max-width:480px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3)';
  // ヘッダ
  var hdr = document.createElement('div');
  hdr.style.cssText = 'padding:12px 14px;background:#1d3a6e;color:#fff;display:flex;align-items:center;gap:8px;flex-shrink:0';
  hdr.innerHTML = '<span style="flex:1;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">📄 ' + fileName + '</span>';
  var btnDl = document.createElement('button');
  btnDl.textContent = '📥 DL';
  btnDl.style.cssText = 'height:28px;padding:0 10px;border-radius:6px;border:none;background:#fff;color:#1d3a6e;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;margin-right:6px';
  btnDl.onclick = function() {
    var blob = new Blob([csvText], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = fileName; a.click(); URL.revokeObjectURL(url);
    showToast('ダウンロードしました', 'ok');
  };
  var btnCl = document.createElement('button');
  btnCl.textContent = '✕ 閉じる';
  btnCl.style.cssText = 'height:28px;padding:0 10px;border-radius:6px;border:none;background:rgba(255,255,255,.2);color:#fff;font-size:11px;cursor:pointer;flex-shrink:0';
  btnCl.onclick = function() { document.body.removeChild(ov); };
  hdr.appendChild(btnDl); hdr.appendChild(btnCl);
  // コンテンツ
  var content = document.createElement('div');
  content.style.cssText = 'overflow-y:auto;flex:1;padding:12px 14px';
  // CSV内容をセクションごとに表示
  var html = '';
  var currentSection = '';
  lines.forEach(function(line) {
    var trimmed = line.trim();
    if (!trimmed) { html += '<div style="height:8px"></div>'; return; }
    // セクションヘッダ（【】で囲まれた行）
    if (trimmed.startsWith('【') && trimmed.indexOf('】') > 0) {
      html += '<div style="margin:8px 0 4px;padding:6px 10px;background:#1d3a6e;color:#fff;border-radius:6px;font-size:12px;font-weight:700">' + escHtml(trimmed) + '</div>';
      currentSection = trimmed;
      return;
    }
    // コメント行（//で始まる）はスキップ
    var parts = trimmed.split(',');
    if (parts.length === 1) {
      // ラベルのみの行（小見出し）
      html += '<div style="margin:6px 0 2px;font-size:11px;font-weight:700;color:#1d3a6e;border-bottom:1px solid #e8eaf0;padding-bottom:2px">' + escHtml(trimmed) + '</div>';
    } else {
      var key = parts[0] || '';
      var val = parts.slice(1).join(',').trim();
      // 判定値の色分け
      var valStyle = 'color:#333';
      if (val === '〇') valStyle = 'color:#2e7d32;font-weight:700';
      else if (val === '△') valStyle = 'color:#e65100;font-weight:700';
      else if (val === '未判定') valStyle = 'color:#bbb';
      html += '<div style="display:flex;align-items:baseline;padding:3px 0;border-bottom:1px solid #f5f5f5;gap:8px">' +
        '<span style="flex:1;font-size:12px;color:#555">' + escHtml(key) + '</span>' +
        '<span style="font-size:12px;' + valStyle + ';text-align:right">' + escHtml(val) + '</span>' +
        '</div>';
    }
  });
  content.innerHTML = html || '<div style="color:#bbb;text-align:center;padding:20px;font-size:12px">内容がありません</div>';
  // タブバー（CSV / 写真）
  var tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;background:#f7f9fc;border-bottom:1px solid #e8eaf0;flex-shrink:0';
  var tabCsv = document.createElement('div');
  tabCsv.style.cssText = 'flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid #1d3a6e;color:#1d3a6e';
  tabCsv.textContent = '📋 点検データ';
  var tabPhoto = document.createElement('div');
  tabPhoto.style.cssText = 'flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:#888';
  tabPhoto.textContent = '📷 写真（' + photoArr.length + '枚）';
  tabBar.appendChild(tabCsv); tabBar.appendChild(tabPhoto);
  // 写真ペイン
  var photoPane = document.createElement('div');
  photoPane.style.cssText = 'overflow-y:auto;flex:1;padding:12px;display:none';
  if (photoArr.length) {
    var pgrid = document.createElement('div');
    pgrid.style.cssText = 'display:grid;grid-template-columns:repeat(2,1fr);gap:8px';
    photoArr.forEach(function(p) {
      var src = typeof p === 'string' ? p : p.dataUrl;
      var wrap = document.createElement('div');
      wrap.style.cssText = 'border-radius:8px;overflow:hidden;aspect-ratio:1;cursor:pointer';
      var pimg = document.createElement('img');
      pimg.src = src; pimg.style.cssText = 'width:100%;height:100%;object-fit:cover';
      pimg.onclick = function() { viewPhoto(src); };
      wrap.appendChild(pimg); pgrid.appendChild(wrap);
    });
    photoPane.appendChild(pgrid);
  } else {
    photoPane.innerHTML = '<div style="text-align:center;padding:30px;font-size:12px;color:#bbb">この記録には写真がありません</div>';
  }
  tabCsv.onclick = function() {
    content.style.display = 'block'; photoPane.style.display = 'none';
    tabCsv.style.cssText = 'flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid #1d3a6e;color:#1d3a6e';
    tabPhoto.style.cssText = 'flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:#888';
  };
  tabPhoto.onclick = function() {
    content.style.display = 'none'; photoPane.style.display = 'block';
    tabPhoto.style.cssText = 'flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid #1d3a6e;color:#1d3a6e';
    tabCsv.style.cssText = 'flex:1;padding:9px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:#888';
  };
  box.appendChild(hdr); box.appendChild(tabBar); box.appendChild(content); box.appendChild(photoPane);
  ov.appendChild(box);
  ov.onclick = function(e) { if (e.target === ov) document.body.removeChild(ov); };
  document.body.appendChild(ov);
}

  list.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:#aaa">Driveから読み込み中...</div>';
  box.appendChild(hdr); box.appendChild(note); box.appendChild(list);
  ov.appendChild(box);
  ov.onclick = function(e) { if (e.target === ov) document.body.removeChild(ov); };
  document.body.appendChild(ov);

  // GASからファイル一覧取得
  if (GAS_URL.indexOf('YOUR_SCRIPT_ID') >= 0) {
    list.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:#c62828">GAS URLが未設定です</div>';
    return;
  }
  fetch(GAS_URL + '?action=getHistory&user=' + encodeURIComponent(currentUser) + '&targetUser=' + encodeURIComponent(currentUser))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var files = data.files || [];
      if (!files.length) {
        list.innerHTML = '<div style="text-align:center;padding:30px;font-size:12px;color:#bbb">Driveに保存済みファイルが見つかりません</div>';
        return;
      }
      list.innerHTML = '';
      files.forEach(function(f) {
        var item = document.createElement('div');
        item.style.cssText = 'padding:12px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer';
        item.innerHTML = '<div style="font-size:13px;font-weight:700;color:#1d3a6e">☁️ ' + escHtml(f.facility||f.name) + '</div>' +
          '<div style="font-size:11px;color:#888;margin-top:2px">' + escHtml(f.date||'') + ' ／ ' + escHtml(f.inspector||'') + '</div>';
        item.onmouseover = function() { item.style.background = '#f0f4ff'; };
        item.onmouseout  = function() { item.style.background = ''; };
        var doRestore = function(fid, fname, facility, date) {
          return function() {
            if (!confirm('「' + facility + '」 ' + date + ' のデータを復元しますか？\n現在の入力内容は上書きされます。')) return;
            document.body.removeChild(ov);
            showToast('Driveからデータ取得中...', 'ok');
            fetch(GAS_URL + '?action=getFile&fileId=' + encodeURIComponent(fid))
              .then(function(r) { return r.json(); })
              .then(function(d) {
                if (!d.ok) { showToast('取得失敗: ' + (d.message||''), 'err'); return; }
                // CSVを解析してrestoreDataを呼ぶ
                restoreFromCsv(d.content);
              })
              .catch(function() { showToast('Drive取得に失敗しました', 'err'); });
          };
        };
        item.onclick = doRestore(f.id, f.name, f.facility||f.name, f.date||'');
        item.ontouchstart = doRestore(f.id, f.name, f.facility||f.name, f.date||'');
        list.appendChild(item);
      });
    })
    .catch(function() {
      list.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:#c62828">Drive接続に失敗しました</div>';
    });
}

function restoreFromCsv(csvText) {
  // CSVから点検データを復元（1ページ分のみ対応）
  var text = csvText.replace(/^\uFEFF/, '');
  var lines = text.split('\n');
  showToast('データを復元中...', 'ok');
  // 既存の全ページをリセット
  elecPages = []; genPages = []; solarPages = []; battPages = [];
  eSeq = 0; gSeq = 0; sSeq = 0; bSeq = 0;
  var pages = document.getElementById('pages');
  if (pages) {
    var toRemove = [];
    pages.querySelectorAll('.page').forEach(function(p) {
      if (!p.id.startsWith('page-tool') && p.id !== 'page-hist') toRemove.push(p);
    });
    toRemove.forEach(function(p) { p.remove(); });
  }
  // CSVを解析して復元
  var currentSection = '';
  var currentFacility = '';
  var currentPid = null;
  var currentType = ''; // elec/gen/solar
  var inKensin1 = false, inKensin2 = false;
  var mult = 10;
  lines.forEach(function(line) {
    var parts = line.trim().split(',');
    var key = parts[0] ? parts[0].trim() : '';
    var val = parts[1] ? parts[1].trim() : '';
    // セクションヘッダ
    if (key.startsWith('【') && key.indexOf('電気室') >= 0) {
      addElecPage(); currentPid = elecPages[elecPages.length-1].id; currentType='elec';
      // 事業所名抽出
      var m = key.match(/】事業所:\s*(.+)/);
      currentFacility = m ? m[1].trim() : '';
      setTimeout((function(pid, fac) { return function() {
        var finp = document.getElementById(pid+'-facility');
        if (finp) { finp.value = fac; }
      }; })(currentPid, currentFacility), 50);
      inKensin1 = false; inKensin2 = false;
    } else if (key.startsWith('【') && key.indexOf('発電機') >= 0) {
      addGenPage(); currentPid = genPages[genPages.length-1].id; currentType='gen';
      inKensin1 = false; inKensin2 = false;
    } else if (key.startsWith('【') && key.indexOf('太陽光') >= 0) {
      addSolarPage(); currentPid = solarPages[solarPages.length-1].id; currentType='solar';
      inKensin1 = false; inKensin2 = false;
    }
    if (!currentPid) return;
    // 電力量計
    if (key.indexOf('電力量計（検針）') >= 0) { inKensin1 = true; inKensin2 = false; }
    if (key.indexOf('電力量計（本日）') >= 0) { inKensin2 = true; inKensin1 = false; }
    if (key === '乗率' || key.indexOf('乗率') >= 0) { mult = parseFloat(val.replace('×',''))||10; }
    // 気温・湿度
    if (key === '気温') setValDelay(currentPid+'-temp', val);
    if (key === '湿度') setValDelay(currentPid+'-hum', val);
    // 電力量計の各値（乗率で逆算）
    function unM(v) { var n = parseFloat(v); return isNaN(n) ? v : String(n/mult); }
    if (inKensin1) {
      if (key==='全日電力量') setValDelay(currentPid+'-k1-all', unM(val));
      if (key==='有効電力量') setValDelay(currentPid+'-k1-eff', unM(val));
      if (key==='無効電力量') setValDelay(currentPid+'-k1-react', unM(val));
      if (key==='力率')      setValDelay(currentPid+'-k1-pf', val);
      if (key==='最大需要電力') setValDelay(currentPid+'-k1-maxd', unM(val));
      if (key==='累計最大電力') setValDelay(currentPid+'-k1-cumax', unM(val));
    }
    if (inKensin2) {
      if (key==='全日電力量') setValDelay(currentPid+'-k2-all', unM(val));
      if (key==='有効電力量') setValDelay(currentPid+'-k2-eff', unM(val));
      if (key==='無効電力量') setValDelay(currentPid+'-k2-react', unM(val));
      if (key==='需要電力')   setValDelay(currentPid+'-k2-maxd', unM(val));
    }
    // 電圧・電流
    if (key==='電圧 R相') setValDelay(currentPid+'-vr', val);
    if (key==='電圧 S相') setValDelay(currentPid+'-vs', val);
    if (key==='電圧 T相') setValDelay(currentPid+'-vt', val);
    if (key==='電流 R相') setValDelay(currentPid+'-ar', val);
    if (key==='電流 S相') setValDelay(currentPid+'-as', val);
    if (key==='電流 T相') setValDelay(currentPid+'-at', val);
    // 記事欄
    if (key === '記事欄' && val) {
      setValDelay(currentPid+'-notes', val);
    }
  });
  setTimeout(function() {
    elecPages.forEach(function(p) { calcPower(p.id); syncPf(p.id); });
    solarPages.forEach(function(p) { calcPower(p.id); });
    markUnsaved();
    showToast('復元完了！内容を確認してください', 'ok');
  }, 300);
}

function setValDelay(id, val) {
  setTimeout(function() {
    var el = document.getElementById(id);
    if (!el) return;
    if (el.tagName === 'TEXTAREA') { el.value = (val && val !== '-') ? val : ''; return; }
    if (val && val !== '-') { el.value = val; el.classList.remove('is-dash'); }
    else { el.value = '-'; el.classList.add('is-dash'); }
  }, 150);
}

function restoreData(data) {
  // 既存ページをリセットしてデータを再構築
  elecPages = []; genPages = []; solarPages = []; battPages = [];
  eSeq = 0; gSeq = 0; sSeq = 0; bSeq = 0;
  document.getElementById('pages').querySelectorAll('.page:not(#page-hist)').forEach(function(p) {
    if (!p.id.startsWith('page-tool')) p.remove();
  });

  // 電気室を復元
  (data.elec || []).forEach(function(pg) {
    addElecPage();
    var pid = elecPages[elecPages.length - 1].id;
    setTimeout((function(pid, pg) { return function() { fillElecPage(pid, pg); }; })(pid, pg), 100);
  });
  // 発電機を復元
  (data.gen || []).forEach(function(pg) {
    addGenPage();
    var pid = genPages[genPages.length - 1].id;
    setTimeout((function(pid, pg) { return function() { fillGenPage(pid, pg); }; })(pid, pg), 100);
  });
  // 太陽光を復元
  (data.solar || []).forEach(function(pg) {
    addSolarPage();
    var pid = solarPages[solarPages.length - 1].id;
    setTimeout((function(pid, pg) { return function() { fillSolarPage(pid, pg); }; })(pid, pg), 100);
  });

  showToast('データを復元しました', 'ok');
}

function setVal(id, val) {
  var el = document.getElementById(id);
  if (!el) return;
  if (val && val !== '-') { el.value = val; el.classList.remove('is-dash'); }
  else { el.value = '-'; el.classList.add('is-dash'); }
}

function fillElecPage(pid, pg) {
  // 事業所名
  var fsel = document.getElementById(pid + '-fsel');
  var finp = document.getElementById(pid + '-facility');
  if (fsel && finp) {
    var opts = fsel.options;
    var matched = false;
    for (var i = 0; i < opts.length; i++) {
      if (opts[i].value === pg.facility) { fsel.value = opts[i].value; matched = true; break; }
    }
    if (!matched && pg.facility && pg.facility !== '-') {
      fsel.value = '__other__'; finp.style.display = 'block';
    }
    finp.value = (pg.facility && pg.facility !== '-') ? pg.facility : '';
  }
  // 気温・湿度
  setVal(pid + '-temp', pg.temp); setVal(pid + '-hum', pg.hum);
  // 電力量計
  if (pg.kensin1) {
    var mult = pg.kensin1.mult || 10;
    var msel = document.getElementById(pid + '-k1-mult');
    if (msel) msel.value = String(mult);
    // 乗算済み値を逆算して入力欄に表示
    function unMult(v) { var n = parseFloat(v); return isNaN(n) ? v : String(n / mult); }
    setVal(pid + '-k1-all',   unMult(pg.kensin1.all));
    setVal(pid + '-k1-eff',   unMult(pg.kensin1.eff));
    setVal(pid + '-k1-react', unMult(pg.kensin1.react));
    setVal(pid + '-k1-pf',    pg.kensin1.pf);
    setVal(pid + '-k1-maxd',  unMult(pg.kensin1.maxd));
    setVal(pid + '-k1-cumax', unMult(pg.kensin1.cumax));
    syncPf(pid);
  }
  if (pg.kensin2) {
    var mult2 = (pg.kensin1 && pg.kensin1.mult) || 10;
    function unMult2(v) { var n = parseFloat(v); return isNaN(n) ? v : String(n / mult2); }
    setVal(pid + '-k2-all',   unMult2(pg.kensin2.all));
    setVal(pid + '-k2-eff',   unMult2(pg.kensin2.eff));
    setVal(pid + '-k2-react', unMult2(pg.kensin2.react));
    setVal(pid + '-k2-maxd',  unMult2(pg.kensin2.maxd));
  }
  // 電圧・電流
  setVal(pid + '-vr', pg.vr); setVal(pid + '-vs', pg.vs); setVal(pid + '-vt', pg.vt);
  setVal(pid + '-ar', pg.ar); setVal(pid + '-as', pg.as); setVal(pid + '-at', pg.at);
  calcPower(pid);
  // 点検項目
  var epg = elecPages.find(function(p) { return p.id === pid; });
  if (epg && pg.judgments) {
    epg.jState = Object.assign({}, pg.judgments);
    Object.keys(pg.judgments).forEach(function(k) {
      var grp = document.querySelector('#page-' + pid + ' .jbtns[data-key="' + k + '"]');
      if (!grp) return;
      grp.querySelectorAll('.jbtn').forEach(function(b) { b.classList.remove('on'); });
      var val = pg.judgments[k];
      var target = val === 'ok' ? '.jbtn.ok' : val === 'warn' ? '.jbtn.warn' : '.jbtn.na';
      var btn = grp.querySelector(target);
      if (btn) btn.classList.add('on');
    });
    updateSBar(pid, 'e');
  }
  // 各種測定値
  if (pg.sokVals) {
    Object.keys(pg.sokVals).forEach(function(label) {
      var cleanId = label.replace(/[^a-zA-Z]/g, '');
      setVal(pid + '-sok-' + cleanId, pg.sokVals[label]);
    });
  }
  // 記事欄
  var notesEl = document.getElementById(pid + '-notes');
  if (notesEl && pg.notes && pg.notes !== '-') notesEl.value = pg.notes;
  markUnsaved();
}

function fillGenPage(pid, pg) {

var numpadTarget = null;

// ===== スクロール判定（スワイプ防止と兼用） =====
var _touchStartY = 0, _touchStartX = 0, _isScrolling = false;

function openNumpad(inp) {
  // af（自動計算値）はスキップ、それ以外は全て開く
  if (inp.classList.contains('af') && !inp.hasAttribute('data-extra')) return;
  // スクロール中はテンキーを開かない
  if (_isScrolling) return;
  numpadTarget = inp;
  var existing = document.getElementById('numpad-overlay');
  if (existing) document.body.removeChild(existing);

  var ov = document.createElement('div');
  ov.className = 'numpad-overlay'; ov.id = 'numpad-overlay';

  var box = document.createElement('div'); box.className = 'numpad-box';

  // ディスプレイ
  var disp = document.createElement('div'); disp.className = 'numpad-display';
  var lbl = document.createElement('div'); lbl.className = 'numpad-label';
  // ラベルはinputの前のmlabel要素から取得
  var row = inp.closest('.mrow');
  lbl.textContent = row ? (row.querySelector('.mlabel') ? row.querySelector('.mlabel').textContent.trim() : '') : '';
  var val = document.createElement('div'); val.className = 'numpad-val'; val.id = 'numpad-val';
  val.textContent = inp.value || '-';
  disp.appendChild(lbl); disp.appendChild(val); box.appendChild(disp);

  // 数字グリッド（3列）
  var grid = document.createElement('div'); grid.className = 'numpad-grid';
  var btns = [
    ['7','8','9'],
    ['4','5','6'],
    ['1','2','3'],
    ['-','0','.'],
  ];
  btns.forEach(function(row) {
    row.forEach(function(b) {
      var btn = document.createElement('button');
      btn.className = 'npbtn' + (b === '-' ? ' np-minus' : '');
      btn.textContent = b;
      btn.ontouchend = function(e) { e.preventDefault(); numpadInput(b); };
      btn.onclick = function(e) { e.preventDefault(); numpadInput(b); };
      grid.appendChild(btn);
    });
  });
  box.appendChild(grid);

  // 操作ボタン行（4列）
  var actRow = document.createElement('div');
  actRow.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px';

  var delBtn = document.createElement('button');
  delBtn.className = 'npbtn np-action'; delBtn.textContent = '⌫';
  delBtn.style.fontSize = '20px';
  delBtn.ontouchend = function(e) { e.preventDefault(); numpadDel(); };
  delBtn.onclick = function(e) { e.preventDefault(); numpadDel(); };

  var clrBtn = document.createElement('button');
  clrBtn.className = 'npbtn np-action'; clrBtn.textContent = 'C';
  clrBtn.ontouchend = function(e) { e.preventDefault(); numpadClear(); };
  clrBtn.onclick = function(e) { e.preventDefault(); numpadClear(); };

  var okBtn = document.createElement('button');
  okBtn.className = 'npbtn np-ok'; okBtn.textContent = '完了';
  okBtn.style.fontSize = '13px';
  okBtn.ontouchend = function(e) { e.preventDefault(); closeNumpadEnd(); };
  okBtn.onclick = function(e) { e.preventDefault(); closeNumpadEnd(); };

  var nextBtn = document.createElement('button');
  nextBtn.className = 'npbtn np-ok'; nextBtn.textContent = '次へ →';
  nextBtn.style.cssText = 'background:#0288d1;font-size:13px';
  nextBtn.ontouchend = function(e) { e.preventDefault(); closeNumpad(); };
  nextBtn.onclick = function(e) { e.preventDefault(); closeNumpad(); };

  actRow.appendChild(delBtn); actRow.appendChild(clrBtn);
  actRow.appendChild(okBtn); actRow.appendChild(nextBtn);
  box.appendChild(actRow); ov.appendChild(box);

  // 背景タップで閉じる
  ov.onclick = function(e) { if (e.target === ov) closeNumpadEnd(); };
  ov.ontouchstart = function(e) { if (e.target === ov) { e.preventDefault(); closeNumpadEnd(); } };
  document.body.appendChild(ov);
}

function numpadInput(ch) {
  if (!numpadTarget) return;
  var cur = numpadTarget.value;
  if (cur === '-' && ch !== '-') cur = '';
  if (ch === '-') { cur = cur === '-' ? '' : '-'; }
  else if (ch === '.') { if (!cur.includes('.')) cur += '.'; }
  else { if (cur === '0') cur = ch; else cur += ch; }
  numpadTarget.value = cur;
  numpadTarget.classList.toggle('is-dash', cur === '-');
  var v = document.getElementById('numpad-val');
  if (v) v.textContent = cur || '-';
  markUnsaved();
}

function numpadDel() {
  if (!numpadTarget) return;
  var cur = numpadTarget.value;
  cur = cur.slice(0, -1);
  numpadTarget.value = cur;
  var v = document.getElementById('numpad-val');
  if (v) v.textContent = cur || '-';
  markUnsaved();
}

function numpadClear() {
  if (!numpadTarget) return;
  numpadTarget.value = '';
  var v = document.getElementById('numpad-val');
  if (v) v.textContent = '-';
  markUnsaved();
}

function closeNumpadEnd() {
  // 完了：次の欄には移動しない
  var ov = document.getElementById('numpad-overlay');
  if (ov) document.body.removeChild(ov);
  if (numpadTarget) {
    if (numpadTarget.value === '') numpadTarget.value = '-';
    numpadTarget.classList.toggle('is-dash', numpadTarget.value === '-');
    var extra = numpadTarget.getAttribute('data-extra');
    if (extra) { try { new Function(extra)(); } catch(e) {} }
    markUnsaved();
    numpadTarget = null;
  }
}

function closeNumpad() {
  var ov = document.getElementById('numpad-overlay');
  if (ov) document.body.removeChild(ov);
  if (numpadTarget) {
    if (numpadTarget.value === '') numpadTarget.value = '-';
    numpadTarget.classList.toggle('is-dash', numpadTarget.value === '-');
    // data-extraに書かれたコールバック（calcPower, syncPfなど）を実行
    var extra = numpadTarget.getAttribute('data-extra');
    if (extra) {
      try { new Function(extra)(); } catch(e) {}
    }
    markUnsaved();
    // 次の入力欄に自動で移動
    var currentInp = numpadTarget;
    numpadTarget = null;
    setTimeout(function() { moveToNextInput(currentInp); }, 80);
  }
}

function moveToNextInput(currentInp) {
  // ページ内の全テンキー対象inputを取得
  var all = Array.prototype.slice.call(
    document.querySelectorAll('input.minp:not([class*="af"])[readonly]')
  );
  // 自動計算値（afクラス）とdata-extraなしのafは除外、data-extraありは含める
  all = all.filter(function(el) {
    if (el.classList.contains('af') && !el.hasAttribute('data-extra')) return false;
    return true;
  });
  var idx = all.indexOf(currentInp);
  if (idx >= 0 && idx < all.length - 1) {
    var next = all[idx + 1];
    // 次の入力欄が画面内に表示されるようスクロール
    next.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(function() { openNumpad(next); }, 150);
  }
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type || 'ok'); t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 3500);
}
function showAutoBadge() {
  var b = document.getElementById('auto-badge');
  b.style.display = 'block';
  setTimeout(function() { b.style.display = 'none'; }, 2500);
}

// ===== ブラウザの戻る・進むを無効化 =====
// ===== アプリ切替・ホーム画面移動時に自動保存 =====
document.addEventListener('visibilitychange', function() {
  // 画面が非表示になった瞬間（アプリ切替・ホームボタン）に保存
  if (document.visibilityState === 'hidden' && currentUser) {
    try { autoSave(); } catch(e) {}
  }
  // 画面が再表示されたとき（アプリに戻ってきた）
  if (document.visibilityState === 'visible' && currentUser) {
    showToast('データは自動保存されています', 'ok');
  }
});
// iOS Safari 追加対応
window.addEventListener('pagehide', function() {
  if (currentUser) { try { autoSave(); } catch(e) {} }
});

// ===== ブラウザの戻る・進む・スワイプバックを無効化 =====
history.pushState(null, '', location.href);
window.addEventListener('popstate', function(e) {
  // Androidの物理戻るボタン対応
  if (currentUser) {
    if (confirm('アプリを終了しますか？\n（「キャンセル」でアプリに戻ります）')) {
      // 終了前に保存
      if (unsaved) { try { autoSave(); } catch(err) {} }
      history.go(-1);
    } else {
      history.pushState(null, '', location.href);
    }
  } else {
    history.pushState(null, '', location.href);
  }
});
// 横スワイプを全面ブロック（アプリ切替・戻る・進む防止）
document.addEventListener('touchstart', function(e) {
  _touchStartY = e.touches[0].clientY;
  _touchStartX = e.touches[0].clientX;
  _isScrolling = false;
}, { passive: true });
document.addEventListener('touchmove', function(e) {
  var dy = Math.abs(e.touches[0].clientY - _touchStartY);
  var dx = Math.abs(e.touches[0].clientX - _touchStartX);
  if (dy > 8 || dx > 8) _isScrolling = true;
  // 横スワイプはすべてキャンセル（縦スクロールのみ許可）
  if (dx > dy && dx > 5) {
    e.preventDefault();
  }
}, { passive: false });

// ===== ページ更新・離脱時の警告 =====
window.addEventListener('beforeunload', function(e) {
  if (currentUser) {
    // ログイン中は常に警告（データが消えるのを防ぐ）
    if (unsaved) { try { autoSave(); } catch(err) {} }
    var msg = unsaved
      ? '未保存のデータがあります。ページを更新するとデータが消える可能性があります。'
      : 'ページを更新すると入力内容が消えます。よろしいですか？';
    e.preventDefault();
    e.returnValue = msg;
    return msg;
  }
});

(function() {
  var savedUser = loadSession();
  if (savedUser) {
    loginSuccess(savedUser);
  }
})();
</script>
