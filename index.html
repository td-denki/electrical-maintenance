<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>匡電気管理事務所株式会社 電気設備月次点検入力アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;color:#111;font-size:14px}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.hdr{background:#1d3a6e;padding:10px 14px;position:sticky;top:0;z-index:40;color:#fff}
.hdr h1{font-size:13px;font-weight:700;line-height:1.4}
.hdr p{font-size:10px;opacity:.75;margin-top:2px}
.login-overlay{position:fixed;inset:0;background:rgba(10,20,50,.75);z-index:100;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:28px 24px;width:320px;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-logo{font-size:13px;font-weight:700;color:#1d3a6e;line-height:1.5;margin-bottom:16px}
.login-logo span{display:block;font-size:11px;color:#888;font-weight:400;margin-top:2px}
.login-inp{width:100%;height:40px;border:1px solid #ddd;border-radius:8px;font-size:14px;padding:0 14px;outline:none;margin-bottom:10px;text-align:center}
.login-inp:focus{border-color:#1d3a6e}
.login-btn{width:100%;height:42px;border-radius:8px;border:none;background:#1d3a6e;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.login-btn:active{opacity:.85}
.login-err{font-size:11px;color:#c62828;min-height:16px;margin-top:6px}
.login-note{font-size:10px;color:#bbb;margin-top:12px;line-height:1.6}
.user-bar{background:#e8edf8;border-bottom:1px solid #c5cfe8;padding:5px 14px;display:flex;align-items:center;gap:8px;font-size:11px;color:#1d3a6e;font-weight:600}
.user-bar span{flex:1}
.logout-btn{font-size:11px;color:#888;cursor:pointer;background:none;border:none;padding:2px 8px;border-radius:4px}
.logout-btn:hover{background:#dde}
.tabbar{background:#fff;border-bottom:1px solid #ddd;display:flex;overflow-x:auto;position:sticky;top:52px;z-index:39;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tbtn{flex-shrink:0;padding:9px 12px;font-size:11px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tbtn.active{color:#1d3a6e;border-bottom-color:#1d3a6e}
.tbtn.gen-tab{color:#e65100}
.tbtn.gen-tab.active{color:#e65100;border-bottom-color:#e65100}
.tab-add{flex-shrink:0;padding:9px 10px;font-size:17px;color:#1d3a6e;cursor:pointer}
.tab-gen-add{flex-shrink:0;padding:9px 10px;font-size:17px;color:#e65100;cursor:pointer}
.tab-close{margin-left:4px;font-size:11px;opacity:.4;cursor:pointer}
.tab-close:hover{opacity:1}
.page{display:none}.page.active{display:block}
.card{background:#fff;border-radius:12px;margin:8px 10px 0;border:1px solid #e8eaf0;overflow:hidden}
.card-hdr{padding:9px 12px;background:#f7f9fc;border-bottom:1px solid #e8eaf0;font-size:12px;font-weight:700;color:#555;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.card-hdr .tog{margin-left:auto;color:#bbb;transition:transform .2s;font-size:13px}
.card-body.collapsed{display:none}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 10px 0}
.meta-item{background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:8px 10px}
.meta-item label{font-size:11px;color:#888;display:block;margin-bottom:3px}
.meta-item input{width:100%;height:30px;border:1px solid #ddd;border-radius:6px;background:#fafafa;font-size:13px;padding:0 8px;outline:none;-webkit-appearance:none}
.meta-item input:focus{border-color:#1d3a6e}
.meta-item .auto-val{height:30px;line-height:30px;font-size:13px;font-weight:600;color:#333;padding:0 4px}
.meta-full{grid-column:1/-1}
.jrow{display:flex;align-items:center;padding:7px 10px 7px 12px;border-bottom:1px solid #f0f0f0;gap:8px}
.jrow:last-child{border-bottom:none}
.jnum{font-size:11px;color:#bbb;min-width:20px;text-align:right;flex-shrink:0}
.jlabel{flex:1;font-size:12px;line-height:1.4;color:#222}
.jbtns{display:flex;gap:3px;flex-shrink:0}
.jbtn{width:34px;height:28px;border-radius:6px;border:1px solid #ddd;background:#f7f7f7;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;font-weight:600}
.jbtn.ok.on{background:#e6f4ea;border-color:#4caf50;color:#2e7d32}
.jbtn.warn.on{background:#fff3e0;border-color:#ff9800;color:#e65100}
.jbtn.na.on{background:#f0f0f0;border-color:#aaa;color:#555}
.mgroup-label{padding:5px 12px 3px;font-size:11px;font-weight:700;color:#1d3a6e;background:#f0f4ff;border-bottom:1px solid #dde4f8;border-top:1px solid #dde4f8}
.mrow{display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid #f0f0f0;gap:8px;min-height:40px}
.mrow:last-child{border-bottom:none}
.mlabel{flex:1;font-size:12px;color:#333;white-space:nowrap}
.mhint{font-size:10px;color:#bbb;margin-top:1px}
.minp{height:30px;width:82px;border:1px solid #ddd;border-radius:6px;background:#fafafa;color:#111;font-size:13px;text-align:right;padding:0 6px;outline:none;flex-shrink:0}
.minp:focus{border-color:#1d3a6e}
.munit{font-size:11px;color:#888;min-width:46px;flex-shrink:0}
.oxbtns{display:flex;gap:4px;flex-shrink:0}
.oxbtn{width:36px;height:30px;border-radius:6px;border:1px solid #ddd;background:#f7f7f7;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;font-weight:700}
.oxbtn.ok.on{background:#e6f4ea;border-color:#4caf50;color:#2e7d32}
.oxbtn.ng.on{background:#ffebee;border-color:#f44336;color:#c62828}
.sub-card{margin:4px 8px;border:1px solid #dde4f8;border-radius:8px;overflow:hidden}
.sub-hdr{display:flex;align-items:center;padding:6px 10px;background:#eef2ff;border-bottom:1px solid #dde4f8;gap:6px}
.sub-hdr-label{font-size:12px;font-weight:700;color:#1d3a6e;flex:1}
.sub-del{width:24px;height:24px;border-radius:5px;border:none;background:#ffe0e0;color:#c62828;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sel-row{display:flex;align-items:center;padding:6px 12px;border-bottom:1px solid #f0f0f0;gap:8px;background:#fffbf0}
.sel-row label{font-size:11px;color:#888;white-space:nowrap}
.sel-row select{flex:1;height:30px;border:1px solid #ddd;border-radius:6px;background:#fafafa;font-size:12px;padding:0 6px;outline:none;color:#333;font-weight:600}
.add-row{padding:8px 10px;display:flex;justify-content:center;border-top:1px solid #f0f0f0}
.btn-add{height:32px;padding:0 16px;border-radius:8px;border:1px dashed #1d3a6e;background:#f0f4ff;color:#1d3a6e;font-size:12px;font-weight:700;cursor:pointer}
.btn-add.orange{border-color:#e65100;background:#fff3e0;color:#e65100}
.sbar{margin:8px 10px 0;background:#fff;border:1px solid #e8eaf0;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.sc{text-align:center;min-width:40px}
.sc .n{font-size:18px;font-weight:700}
.sc .l{font-size:10px;color:#888;margin-top:1px}
.n-ok{color:#2e7d32}.n-warn{color:#e65100}.n-na{color:#888}
.pb-wrap{flex:1}
.pb{height:4px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:4px}
.pb-fill{height:100%;background:#1d3a6e;border-radius:4px;transition:width .3s}
.pb-txt{font-size:10px;color:#888}
.notes-wrap{padding:8px 10px}
.notes-wrap label{font-size:11px;color:#888;display:block;margin-bottom:4px}
.notes-wrap textarea{width:100%;height:64px;border:1px solid #ddd;border-radius:6px;background:#fafafa;color:#111;font-size:12px;padding:6px 8px;resize:none;outline:none;font-family:inherit}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:10px 12px;display:flex;gap:6px;max-width:480px;margin:0 auto;z-index:38}
.btn-prim{flex:1;height:42px;border-radius:8px;border:none;background:#1d3a6e;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.btn-prim:active{opacity:.85}
.btn-sec{height:42px;padding:0 12px;border-radius:8px;border:1px solid #ddd;background:#f7f7f7;color:#444;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:600}
.hist-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.hist-item:hover{background:#f0f4ff}
.hist-name{font-size:12px;font-weight:600;color:#1d3a6e}
.hist-meta{font-size:11px;color:#888;margin-top:2px}
.hist-empty{padding:16px;text-align:center;font-size:12px;color:#bbb}
.auto-badge{position:fixed;top:58px;right:12px;background:#4caf50;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;z-index:50;display:none}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:7px 14px;border-radius:8px;font-size:12px;display:none;z-index:200;white-space:nowrap;max-width:320px;text-align:center}
.toast.ok{background:#1d3a6e;color:#fff}
.toast.err{background:#c62828;color:#fff}
.hint-bar{padding:4px 12px;font-size:10px;color:#aaa;background:#fafafa;border-bottom:1px solid #f0f0f0}
</style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-logo">
      匡電気管理事務所株式会社<br>
      <span>電気設備月次点検入力アプリ</span>
    </div>
    <input class="login-inp" type="text" id="login-user" placeholder="氏名を入力" autocomplete="name">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-note">※ 許可されたユーザーのみ利用可能</div>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
  <div class="hdr">
    <h1>匡電気管理事務所株式会社</h1>
    <p>電気設備月次点検入力アプリ　<span id="hdr-sub"></span></p>
  </div>
  <div class="user-bar">
    <span id="user-disp">👤</span>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="tabbar" id="tabbar"></div>
  <div id="pages"></div>
</div>

<div class="footer" id="footer" style="display:none">
  <button class="btn-sec" onclick="showHistory()">📋 履歴</button>
  <button class="btn-sec" onclick="downloadCSV()">CSV</button>
  <button class="btn-prim" onclick="saveAll(true)">💾 保存</button>
</div>
<div class="auto-badge" id="auto-badge">自動保存</div>
<div class="toast" id="toast"></div>

<script>
// =============================================
// 設定エリア（ここだけ変更すればOK）
// =============================================
// GASを設定したらここにURLを貼り付けてください
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxPT_JFlwiasjD44w5-17OjzepVIm5UHZKGAe_qC2fmfMY2MfwO8AB2xeQNY8h9SzXoBA/exec';
// =============================================

const ELEC_ITEMS=['責任分界開閉器・保護継電器の良否','避雷器（付属開閉器を含む）の良否','引込ケーブルの良否','構内第１柱・支持物等の良否','断路器または開閉器の良否','遮断器または電力ヒューズの良否','保護継電器の状態の良否','計器用変成器（VT・CT)の良否','母線（碍子、AS・DS・VCB等を含む）の良否','動力用変圧器：電灯用変圧器の良否','高圧コンデンサ・リアクトルの良否','受・配電盤の良否','接地工事(接地線・保護管等)の良否','機器全般の異音・異臭・振動等の有無','機器及び配線接続部等の過熱の有無','機器及び配線の離隔距離の良否','電気室等への小動物侵入対策の良否','構内配電線路等の良否','蓄電池設備の良否','機械器具の過熱の有無','電灯盤・動力盤・制御盤等の良否','負荷設備の損傷・汚損・損傷・負傷の有無','機械器具の取付状態の良否','配線の取付状態の良否','配線の過熱の有無','電線と他物の離隔距離の良否','接地線等の保安装置の取付状態の良否','電気設備の増設及び変更工事の有無','電気設備等に触れたとき、「電撃」を感じた','漏電遮断器・警報器の動作の有無','遮断器・ヒューズ等の動作の有無','電気設備からの異音・異臭の有無','その他の異常の有無'];
const GEN_ITEMS=['室内または筐体内に不要物の有無','風雨、小動物等の侵入防止対策の有無','照明及び換気対策の有無','接地線の取り付け状態の有無','水漏れ、オイル漏れ、他の異常の有無','運転による異常音、振動等の有無','異臭、割れ、はがれ等の有無','排気の異常の有無','換気状態の異常の有無','切替開閉器の異常の有無','メーター類の指示の有無','表示ランプの玉切れの有無'];
const TR_USES=['電灯','動力','非常電灯','非常動力','その他'];
const KIKI_FIXED=['高圧ケーブル','LBS','コンデンサ','リアクトル'];

const now=new Date();
const Y=now.getFullYear(),Mo=now.getMonth()+1,D=now.getDate();
const dateStr=`${Y}年${Mo}月${D}日`;
const dateKey=`${Y}${String(Mo).padStart(2,'0')}${String(D).padStart(2,'0')}`;

let currentUser='';
let elecPages=[],genPages=[],activeTab='';
let elecPageSeq=0,genPageSeq=0;
let trSeqMap={},kikiSeqMap={};
let unsaved=false,inputStarted=false;

// ローカルストレージ（ブラウザ保存）
const store={
  set:(k,v)=>localStorage.setItem(k,v),
  get:(k)=>{const v=localStorage.getItem(k);return v?{value:v}:null}
};

async function doLogin(){
  const user=document.getElementById('login-user').value.trim();
  const errEl=document.getElementById('login-err');
  if(!user){errEl.textContent='氏名を入力してください';return;}
  errEl.textContent='確認中...';
  if(GAS_URL.includes('YOUR_SCRIPT_ID')){
    errEl.textContent='※ デモモード（GAS URL設定後に本番認証）';
    setTimeout(()=>loginSuccess(user),500);
    return;
  }
  try{
    const res=await fetch(`${GAS_URL}?action=auth&user=${encodeURIComponent(user)}`);
    const json=await res.json();
    if(json.ok){loginSuccess(user);}
    else{errEl.textContent='このユーザー名は許可されていません';}
  }catch(e){
    errEl.textContent='通信エラー。デモモードで起動します';
    setTimeout(()=>loginSuccess(user),500);
  }
}
function loginSuccess(user){
  currentUser=user;
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('footer').style.display='flex';
  document.getElementById('hdr-sub').textContent=dateStr;
  document.getElementById('user-disp').textContent='👤 '+user;
  renderTabs(); addElecPage(); addGenPage();
  setInterval(()=>{if(unsaved)saveAll(false);},600000);
}
function doLogout(){
  if(!confirm('ログアウトしますか？（未保存データは失われます）'))return;
  location.reload();
}
document.getElementById('login-user').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function addElecPage(){
  elecPageSeq++;
  const pid='e'+elecPageSeq;
  elecPages.push({id:pid,label:'電気室'+elecPageSeq,jState:{}});
  trSeqMap[pid]=0; kikiSeqMap[pid]=0;
  renderTabs(); buildElecPage(pid); switchTab(pid);
}
function addGenPage(){
  genPageSeq++;
  const pid='g'+genPageSeq;
  genPages.push({id:pid,label:'発電機'+genPageSeq,jState:{},genCount:0});
  renderTabs(); buildGenPage(pid); switchTab(pid);
}
function removePage(pid){
  if(!confirm('このページを削除しますか？'))return;
  elecPages=elecPages.filter(p=>p.id!==pid);
  genPages=genPages.filter(p=>p.id!==pid);
  const el=document.getElementById('page-'+pid);if(el)el.remove();
  renderTabs();
  const all=[...elecPages,...genPages];
  if(all.length>0)switchTab(all[0].id);
}
function renderTabs(){
  const bar=document.getElementById('tabbar'); bar.innerHTML='';
  elecPages.forEach(p=>{
    const d=document.createElement('div');
    d.className='tbtn'+(activeTab===p.id?' active':''); d.id='tab-'+p.id;
    d.innerHTML='⚡'+p.label+'<span class="tab-close" onclick="event.stopPropagation();removePage(\''+p.id+'\')">✕</span>';
    d.onclick=()=>switchTab(p.id); bar.appendChild(d);
  });
  const eadd=document.createElement('div');eadd.className='tab-add';eadd.title='電気室追加';eadd.textContent='＋⚡';eadd.onclick=addElecPage;bar.appendChild(eadd);
  genPages.forEach(p=>{
    const d=document.createElement('div');
    d.className='tbtn gen-tab'+(activeTab===p.id?' active':''); d.id='tab-'+p.id;
    d.innerHTML='🔋'+p.label+'<span class="tab-close" onclick="event.stopPropagation();removePage(\''+p.id+'\')">✕</span>';
    d.onclick=()=>switchTab(p.id); bar.appendChild(d);
  });
  const gadd=document.createElement('div');gadd.className='tab-gen-add';gadd.title='発電機追加';gadd.textContent='＋🔋';gadd.onclick=addGenPage;bar.appendChild(gadd);
  const htab=document.createElement('div');htab.className='tbtn'+(activeTab==='hist'?' active':'');htab.id='tab-hist';htab.textContent='📋履歴';htab.onclick=()=>switchTab('hist');bar.appendChild(htab);
}
function switchTab(pid){
  activeTab=pid;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById('page-'+pid);if(el)el.classList.add('active');
  document.querySelectorAll('.tbtn').forEach(t=>t.classList.remove('active'));
  const tb=document.getElementById('tab-'+pid);if(tb)tb.classList.add('active');
  if(pid==='hist')renderHistory();
}
function mInp(id){return '<input class="minp" type="text" inputmode="decimal" id="'+id+'" placeholder="-">';}
function trHTML(pid,tid,isFirst){
  const cid=pid+'-tr-'+tid;
  const delBtn=isFirst?'':'<button class="sub-del" onclick="document.getElementById(\''+cid+'\').remove();markUnsaved()">✕</button>';
  const useOpts=TR_USES.map(u=>'<option>'+u+'</option>').join('');
  return '<div class="sub-card" id="'+cid+'"><div class="sub-hdr"><span class="sub-hdr-label">変圧器 #'+tid+'</span>'+delBtn+'</div>'+
    '<div class="sel-row"><label>用途</label><select id="'+cid+'-use">'+useOpts+'</select></div>'+
    '<div class="mgroup-label">電圧</div>'+
    '<div class="mrow"><div class="mlabel">電圧 R相</div>'+mInp(cid+'-vr')+'<div class="munit">V</div></div>'+
    '<div class="mrow"><div class="mlabel">電圧 S相</div>'+mInp(cid+'-vs')+'<div class="munit">V</div></div>'+
    '<div class="mrow"><div class="mlabel">電圧 T相</div>'+mInp(cid+'-vt')+'<div class="munit">V</div></div>'+
    '<div class="mgroup-label">電流</div>'+
    '<div class="mrow"><div class="mlabel">電流 R相</div>'+mInp(cid+'-ar')+'<div class="munit">A</div></div>'+
    '<div class="mrow"><div class="mlabel">電流 S相</div>'+mInp(cid+'-as')+'<div class="munit">A</div></div>'+
    '<div class="mrow"><div class="mlabel">電流 T相</div>'+mInp(cid+'-at')+'<div class="munit">A</div></div>'+
    '<div class="mrow"><div class="mlabel">温度<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-tp')+'<div class="munit">℃</div></div>'+
    '<div class="mrow"><div class="mlabel">漏れ電流<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-lk')+'<div class="munit">mA</div></div></div>';
}
function fixedKikiHTML(pid,label){
  const cid=pid+'-fkk-'+label;
  return '<div class="sub-card" id="'+cid+'"><div class="sub-hdr"><span class="sub-hdr-label">'+label+'</span></div>'+
    '<div class="mrow"><div class="mlabel">温度<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-tmp')+'<div class="munit">℃</div></div></div>';
}
function buildElecPage(pid){
  const pages=document.getElementById('pages');
  const page=document.createElement('div');
  page.className='page'; page.id='page-'+pid;
  const fixedKikiHtml=KIKI_FIXED.map(k=>fixedKikiHTML(pid,k)).join('');
  page.innerHTML=
    '<div class="meta-grid">'+
    '<div class="meta-item meta-full"><label>事業所名</label><input type="text" id="'+pid+'-name" placeholder="例: ○○ビル" inputmode="latin" autocomplete="organization"></div>'+
    '<div class="meta-item"><label>点検日</label><div class="auto-val">'+dateStr+'</div></div>'+
    '<div class="meta-item"><label>気温 <span style="font-size:10px;color:#bbb">対象外は「-」</span></label><input type="text" inputmode="decimal" id="'+pid+'-temp" placeholder="-"></div>'+
    '<div class="meta-item"><label>湿度(%) <span style="font-size:10px;color:#bbb">対象外は「-」</span></label><input type="text" inputmode="decimal" id="'+pid+'-hum" placeholder="-"></div>'+
    '</div>'+
    '<div class="sbar"><div class="sc"><div class="n n-ok" id="'+pid+'-cnt-ok">0</div><div class="l">〇 良好</div></div>'+
    '<div class="sc"><div class="n n-warn" id="'+pid+'-cnt-warn">0</div><div class="l">△ 要観察</div></div>'+
    '<div class="sc"><div class="n n-na" id="'+pid+'-cnt-na">0</div><div class="l">－ 対象外</div></div>'+
    '<div class="pb-wrap"><div class="pb"><div class="pb-fill" id="'+pid+'-pb" style="width:0%"></div></div><div class="pb-txt" id="'+pid+'-pb-txt">0 / 33</div></div></div>'+
    '<div class="card"><div class="card-hdr" onclick="toggle(this)">点検項目（全33項目）<span class="tog">▾</span></div><div class="card-body">'+buildElecItems(pid)+'</div></div>'+
    '<div class="card"><div class="card-hdr" onclick="toggle(this)">電圧・電流（高圧）<span class="tog">▾</span></div><div class="card-body">'+
    '<div class="hint-bar">数値または「-」（対象外）を入力</div>'+
    '<div class="mgroup-label">電圧</div>'+
    '<div class="mrow"><div class="mlabel">電圧 R相</div>'+mInp(pid+'-vr')+'<div class="munit">kV</div></div>'+
    '<div class="mrow"><div class="mlabel">電圧 S相</div>'+mInp(pid+'-vs')+'<div class="munit">kV</div></div>'+
    '<div class="mrow"><div class="mlabel">電圧 T相</div>'+mInp(pid+'-vt')+'<div class="munit">kV</div></div>'+
    '<div class="mgroup-label">電流</div>'+
    '<div class="mrow"><div class="mlabel">電流 R相</div>'+mInp(pid+'-ar')+'<div class="munit">A</div></div>'+
    '<div class="mrow"><div class="mlabel">電流 S相</div>'+mInp(pid+'-as')+'<div class="munit">A</div></div>'+
    '<div class="mrow"><div class="mlabel">電流 T相</div>'+mInp(pid+'-at')+'<div class="munit">A</div></div></div></div>'+
    '<div class="card"><div class="card-hdr" onclick="toggle(this)">高圧変圧器<span class="tog">▾</span></div><div class="card-body">'+
    '<div class="hint-bar">数値または「-」（対象外）を入力</div>'+
    '<div id="'+pid+'-tr-list">'+trHTML(pid,1,true)+'</div>'+
    '<div class="add-row"><button class="btn-add" onclick="addTr(\''+pid+'\')">＋ 変圧器を追加</button></div></div></div>'+
    '<div class="card"><div class="card-hdr" onclick="toggle(this)">高圧機器<span class="tog">▾</span></div><div class="card-body">'+
    '<div class="hint-bar">温度を入力。対象外は「-」</div>'+
    fixedKikiHtml+
    '<div id="'+pid+'-kiki-list"></div>'+
    '<div class="add-row"><button class="btn-add" onclick="addKiki(\''+pid+'\')">＋ 機器を追加</button></div></div></div>'+
    '<div class="card" style="margin-bottom:6px"><div class="card-hdr" onclick="toggle(this)">記事欄<span class="tog">▾</span></div><div class="card-body"><div class="notes-wrap"><label>特記事項・処置内容</label><textarea id="'+pid+'-notes" placeholder="異常内容・処置など" inputmode="latin"></textarea></div></div></div>';
  trSeqMap[pid]=1;
  pages.appendChild(page);
  page.querySelectorAll('input,textarea,select').forEach(el=>el.addEventListener('input',markUnsaved));
}
function buildElecItems(pid){
  return ELEC_ITEMS.map((label,i)=>
    '<div class="jrow"><div class="jnum">'+(i+1)+'</div><div class="jlabel">'+label+'</div>'+
    '<div class="jbtns" data-pid="'+pid+'" data-ek="'+i+'">'+
    '<button class="jbtn ok" onclick="setJ(this,\'ok\',\'e\')">〇</button>'+
    '<button class="jbtn warn" onclick="setJ(this,\'warn\',\'e\')">△</button>'+
    '<button class="jbtn na" onclick="setJ(this,\'na\',\'e\')">－</button></div></div>').join('');
}
function addTr(pid){
  trSeqMap[pid]=(trSeqMap[pid]||1)+1;
  const tid=trSeqMap[pid];
  const wrap=document.createElement('div');
  wrap.innerHTML=trHTML(pid,tid,false);
  const card=wrap.firstElementChild;
  card.querySelectorAll('input,select').forEach(el=>el.addEventListener('input',markUnsaved));
  document.getElementById(pid+'-tr-list').appendChild(card);
  markUnsaved();
}
function addKiki(pid){
  kikiSeqMap[pid]=(kikiSeqMap[pid]||0)+1;
  const kid=kikiSeqMap[pid];
  const cid=pid+'-kk-'+kid;
  const div=document.createElement('div');
  div.className='sub-card'; div.id=cid;
  div.innerHTML='<div class="sub-hdr"><select style="background:transparent;border:none;outline:none;font-weight:700;color:#1d3a6e;font-size:12px;flex:1"><option>LBS</option><option>コンデンサ</option><option>リアクトル</option><option>断路器</option><option>その他</option></select><button class="sub-del" onclick="document.getElementById(\''+cid+'\').remove();markUnsaved()">✕</button></div><div class="mrow"><div class="mlabel">温度<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-tmp')+'<div class="munit">℃</div></div>';
  div.querySelectorAll('input,select').forEach(el=>el.addEventListener('input',markUnsaved));
  document.getElementById(pid+'-kiki-list').appendChild(div);
  markUnsaved();
}
function buildGenPage(pid){
  const pages=document.getElementById('pages');
  const page=document.createElement('div');
  page.className='page'; page.id='page-'+pid;
  page.innerHTML=
    '<div class="sbar" style="margin-top:10px">'+
    '<div class="sc"><div class="n n-ok" id="'+pid+'-cnt-ok">0</div><div class="l">〇 良好</div></div>'+
    '<div class="sc"><div class="n n-warn" id="'+pid+'-cnt-warn">0</div><div class="l">△ 要観察</div></div>'+
    '<div class="sc"><div class="n n-na" id="'+pid+'-cnt-na">0</div><div class="l">－ 対象外</div></div>'+
    '<div class="pb-wrap"><div class="pb"><div class="pb-fill" id="'+pid+'-pb" style="width:0%"></div></div><div class="pb-txt" id="'+pid+'-pb-txt">0 / 12</div></div></div>'+
    '<div class="card"><div class="card-hdr" onclick="toggle(this)">点検項目（全12項目）<span class="tog">▾</span></div><div class="card-body">'+buildGenItems(pid)+'</div></div>'+
    '<div style="padding:6px 10px 0;font-size:10px;color:#aaa;text-align:center">数値または「-」（対象外）を入力</div>'+
    '<div id="'+pid+'-gen-list">'+genUnitHTML(pid,1)+'</div>'+
    '<div style="padding:6px 10px 0"><button class="btn-add orange" style="width:100%;height:36px" onclick="addGenUnit(\''+pid+'\')">＋ 発電機を追加</button></div>'+
    '<div class="card" style="margin-top:8px;margin-bottom:6px"><div class="card-hdr" onclick="toggle(this)">記事欄<span class="tog">▾</span></div><div class="card-body"><div class="notes-wrap"><label>特記事項・処置内容</label><textarea id="'+pid+'-notes" placeholder="異常内容・処置など" inputmode="latin"></textarea></div></div></div>';
  const pg=genPages.find(p=>p.id===pid);
  if(pg) pg.genCount=1;
  pages.appendChild(page);
  page.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',markUnsaved));
}
function buildGenItems(pid){
  return GEN_ITEMS.map((label,i)=>
    '<div class="jrow"><div class="jnum">'+(i+1)+'</div><div class="jlabel">'+label.trim()+'</div>'+
    '<div class="jbtns" data-pid="'+pid+'" data-gk="'+i+'">'+
    '<button class="jbtn ok" onclick="setJ(this,\'ok\',\'g\')">〇</button>'+
    '<button class="jbtn warn" onclick="setJ(this,\'warn\',\'g\')">△</button>'+
    '<button class="jbtn na" onclick="setJ(this,\'na\',\'g\')">－</button></div></div>').join('');
}
function genUnitHTML(pid,gn){
  const cid=pid+'-gen-'+gn;
  const label=gn===1?'発電機':'発電機'+gn;
  const delBtn=gn===1?'':'<button class="sub-del" style="margin-left:8px" onclick="event.stopPropagation();document.getElementById(\''+cid+'\').remove();markUnsaved()">✕</button>';
  return '<div class="card" id="'+cid+'" style="margin-top:8px">'+
    '<div class="card-hdr" onclick="toggle(this)">'+label+' <span class="tog">▾</span>'+delBtn+'</div>'+
    '<div class="card-body">'+
    '<div class="mrow"><div class="mlabel">燃料<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-fuel')+'<div class="munit">%</div></div>'+
    '<div class="mrow"><div class="mlabel">回転数<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-rpm')+'<div class="munit">rpm/min</div></div>'+
    '<div class="mrow"><div class="mlabel">冷却水温度<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-coolant')+'<div class="munit">°C</div></div>'+
    '<div class="mrow"><div class="mlabel">油量</div><div class="oxbtns" data-oxk="'+cid+'-oil"><button class="oxbtn ok" onclick="setOX(this,\'ok\')">〇</button><button class="oxbtn ng" onclick="setOX(this,\'ng\')">×</button></div><div class="munit"></div></div>'+
    '<div class="mrow"><div class="mlabel">油圧<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-oilp')+'<div class="munit">MPa</div></div>'+
    '<div class="mrow"><div class="mlabel">電圧<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-volt')+'<div class="munit">V</div></div>'+
    '<div class="mrow"><div class="mlabel">周波数<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-freq')+'<div class="munit">Hz</div></div>'+
    '<div class="mrow"><div class="mlabel">累積運転時間<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-hours')+'<div class="munit">H</div></div>'+
    '<div class="mrow"><div class="mlabel">バッテリー電圧<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-batt')+'<div class="munit">V</div></div>'+
    '<div class="mrow"><div class="mlabel">バッテリー比重<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-sg')+'<div class="munit"></div></div>'+
    '<div class="mrow"><div class="mlabel">バッテリー液面</div><div class="oxbtns" data-oxk="'+cid+'-bliq"><button class="oxbtn ok" onclick="setOX(this,\'ok\')">〇</button><button class="oxbtn ng" onclick="setOX(this,\'ng\')">×</button></div><div class="munit"></div></div>'+
    '<div class="mrow"><div class="mlabel">バッテリー温度<div class="mhint">対象外は「-」</div></div>'+mInp(cid+'-btemp')+'<div class="munit">℃</div></div>'+
    '</div></div>';
}
function addGenUnit(pid){
  const pg=genPages.find(p=>p.id===pid); if(!pg)return;
  pg.genCount=(pg.genCount||1)+1;
  const gn=pg.genCount;
  const wrap=document.createElement('div');
  wrap.innerHTML=genUnitHTML(pid,gn);
  const card=wrap.firstElementChild;
  card.querySelectorAll('input').forEach(el=>el.addEventListener('input',markUnsaved));
  document.getElementById(pid+'-gen-list').appendChild(card);
  markUnsaved();
}
function setJ(btn,val,type){
  const grp=btn.closest('.jbtns');
  const pid=grp.dataset.pid;
  const key=type==='e'?grp.dataset.ek:grp.dataset.gk;
  const pg=type==='e'?elecPages.find(p=>p.id===pid):genPages.find(p=>p.id===pid);
  if(!pg)return;
  grp.querySelectorAll('.jbtn').forEach(b=>b.classList.remove('on'));
  if(pg.jState[key]===val){delete pg.jState[key];}else{pg.jState[key]=val;btn.classList.add('on');}
  updateSBar(pid,type); markUnsaved();
}
function setOX(btn,val){
  const grp=btn.closest('.oxbtns');
  grp.querySelectorAll('.oxbtn').forEach(b=>b.classList.remove('on'));
  if(grp.dataset.val===val){grp.dataset.val='';}else{grp.dataset.val=val;btn.classList.add('on');}
  markUnsaved();
}
function getOX(key){const el=document.querySelector('[data-oxk="'+key+'"]');return el?(el.dataset.val||''):'';}
function updateSBar(pid,type){
  const pg=type==='e'?elecPages.find(p=>p.id===pid):genPages.find(p=>p.id===pid);if(!pg)return;
  const total=type==='e'?33:12;
  const keys=Object.keys(pg.jState);
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  s(pid+'-cnt-ok',keys.filter(k=>pg.jState[k]==='ok').length);
  s(pid+'-cnt-warn',keys.filter(k=>pg.jState[k]==='warn').length);
  s(pid+'-cnt-na',keys.filter(k=>pg.jState[k]==='na').length);
  const pb=document.getElementById(pid+'-pb');if(pb)pb.style.width=Math.round(keys.length/total*100)+'%';
  const pt=document.getElementById(pid+'-pb-txt');if(pt)pt.textContent=keys.length+' / '+total;
}
function toggle(hdr){
  const body=hdr.nextElementSibling;
  const tog=hdr.querySelector('.tog');
  body.classList.toggle('collapsed');
  if(tog)tog.style.transform=body.classList.contains('collapsed')?'rotate(-90deg)':'';
}
function getV(id){const el=document.getElementById(id);return el?(el.value.trim()||'-'):'-';}
function markUnsaved(){
  unsaved=true;
  if(!inputStarted){inputStarted=true;setTimeout(()=>{if(unsaved)saveAll(false);},600000);}
}
function collectAll(){
  const elec=elecPages.map(pg=>{
    const trs=[];
    document.querySelectorAll('#page-'+pg.id+' #'+pg.id+'-tr-list .sub-card').forEach(card=>{
      const cid=card.id;
      trs.push({label:card.querySelector('.sub-hdr-label')?.textContent||'',use:getV(cid+'-use'),vr:getV(cid+'-vr'),vs:getV(cid+'-vs'),vt:getV(cid+'-vt'),ar:getV(cid+'-ar'),as:getV(cid+'-as'),at:getV(cid+'-at'),tp:getV(cid+'-tp'),lk:getV(cid+'-lk')});
    });
    const kikis=KIKI_FIXED.map(k=>({type:k,tmp:getV(pg.id+'-fkk-'+k+'-tmp')}));
    document.querySelectorAll('#page-'+pg.id+' #'+pg.id+'-kiki-list .sub-card').forEach(card=>{
      kikis.push({type:card.querySelector('select')?.value||'',tmp:getV(card.id+'-tmp')});
    });
    return {id:pg.id,label:pg.label,name:getV(pg.id+'-name'),temp:getV(pg.id+'-temp'),hum:getV(pg.id+'-hum'),judgments:{...pg.jState},vr:getV(pg.id+'-vr'),vs:getV(pg.id+'-vs'),vt:getV(pg.id+'-vt'),ar:getV(pg.id+'-ar'),as:getV(pg.id+'-as'),at:getV(pg.id+'-at'),transformers:trs,kiki:kikis,notes:getV(pg.id+'-notes')};
  });
  const gen=genPages.map(pg=>{
    const gens=[];
    document.querySelectorAll('#page-'+pg.id+' #'+pg.id+'-gen-list .card').forEach(card=>{
      const cid=card.id;
      gens.push({label:card.querySelector('.card-hdr')?.childNodes[0]?.textContent?.trim()||cid,fuel:getV(cid+'-fuel'),rpm:getV(cid+'-rpm'),coolant:getV(cid+'-coolant'),oil:getOX(cid+'-oil'),oilp:getV(cid+'-oilp'),volt:getV(cid+'-volt'),freq:getV(cid+'-freq'),hours:getV(cid+'-hours'),batt:getV(cid+'-batt'),sg:getV(cid+'-sg'),bliq:getOX(cid+'-bliq'),btemp:getV(cid+'-btemp')});
    });
    return {id:pg.id,label:pg.label,judgments:{...pg.jState},generators:gens,notes:getV(pg.id+'-notes')};
  });
  return {date:dateStr,inspector:currentUser,facilityName:elecPages.length?getV(elecPages[0].id+'-name')||'未設定':'未設定',elec,gen,savedAt:new Date().toISOString()};
}
function saveAll(showMsg){
  const data=collectAll();
  const key='tenken-'+dateKey;
  try{
    let hist=[];
    try{const r=store.get('tenken-history');if(r)hist=JSON.parse(r.value);}catch(e){}
    const entry={key,date:dateStr,inspector:data.inspector,facility:data.facilityName,savedAt:data.savedAt};
    hist=hist.filter(h=>h.key!==key);hist.unshift(entry);
    if(hist.length>30)hist=hist.slice(0,30);
    store.set('tenken-history',JSON.stringify(hist));
    store.set(key,JSON.stringify(data));
    unsaved=false;
    if(showMsg)showToast('保存しました','ok');else showAutoBadge();
  }catch(e){if(showMsg)showToast('保存エラー','err');}
}
function renderHistory(){
  let hist=[];
  try{const r=store.get('tenken-history');if(r)hist=JSON.parse(r.value);}catch(e){}
  let page=document.getElementById('page-hist');
  if(!page){page=document.createElement('div');page.className='page';page.id='page-hist';document.getElementById('pages').appendChild(page);}
  if(!hist.length){page.innerHTML='<div class="hist-empty">保存済みの記録がありません</div>';return;}
  page.innerHTML='<div style="padding:10px 10px 4px;font-size:11px;color:#888;font-weight:600">保存済み記録（最大30件）</div>'+
    hist.map(h=>'<div class="hist-item"><div class="hist-name">📋 '+(h.facility||'(施設名なし)')+'</div><div class="hist-meta">'+h.date+' ／ '+(h.inspector||'不明')+' ／ '+(h.savedAt||'').slice(0,16).replace('T',' ')+'</div></div>').join('');
}
function showHistory(){switchTab('hist');renderHistory();}
function downloadCSV(){
  const d=collectAll();
  const jl={ok:'〇',warn:'△',na:'－','':'未判定'};
  const fname=dateKey+'_'+d.facilityName+'_'+d.inspector+'.csv';
  let csv='\uFEFF匡電気管理事務所株式会社 電気設備月次点検記録\n';
  csv+='点検日,'+d.date+'\n点検者,'+d.inspector+'\n\n';
  d.elec.forEach(pg=>{
    csv+='【'+pg.label+'】事業所名: '+pg.name+'\n気温,'+pg.temp+',°C,湿度,'+pg.hum+',%\n\n';
    csv+='点検項目,判定\n';
    ELEC_ITEMS.forEach((label,i)=>{csv+=(i+1)+'. '+label+','+(jl[pg.judgments[i]??''])+'\n';});
    csv+='\n電圧・電流（高圧）\n電圧 R相,'+pg.vr+',kV\n電圧 S相,'+pg.vs+',kV\n電圧 T相,'+pg.vt+',kV\n電流 R相,'+pg.ar+',A\n電流 S相,'+pg.as+',A\n電流 T相,'+pg.at+',A\n';
    if(pg.transformers.length){
      csv+='\n高圧変圧器\n名称,用途,電圧R相(V),電圧S相(V),電圧T相(V),電流R相(A),電流S相(A),電流T相(A),温度(℃),漏れ電流(mA)\n';
      pg.transformers.forEach(t=>{csv+=t.label+','+t.use+','+t.vr+','+t.vs+','+t.vt+','+t.ar+','+t.as+','+t.at+','+t.tp+','+t.lk+'\n';});
    }
    csv+='\n高圧機器\n種別,温度(℃)\n';
    pg.kiki.forEach(k=>{csv+=k.type+','+k.tmp+'\n';});
    csv+='\n記事欄\n'+pg.notes+'\n\n';
  });
  d.gen.forEach(pg=>{
    csv+='【'+pg.label+'】\n点検項目,判定\n';
    GEN_ITEMS.forEach((label,i)=>{csv+=(i+1)+'. '+label.trim()+','+(jl[pg.judgments[i]??''])+'\n';});
    pg.generators.forEach(g=>{
      csv+='\n'+g.label+'\n燃料,'+g.fuel+',%\n回転数,'+g.rpm+',rpm/min\n冷却水温度,'+g.coolant+',°C\n';
      csv+='油量,'+g.oil+'\n油圧,'+g.oilp+',MPa\n電圧,'+g.volt+',V\n周波数,'+g.freq+',Hz\n';
      csv+='累積運転時間,'+g.hours+',H\nバッテリー電圧,'+g.batt+',V\nバッテリー比重,'+g.sg+'\nバッテリー液面,'+g.bliq+'\nバッテリー温度,'+g.btemp+',℃\n';
    });
    csv+='\n記事欄\n'+pg.notes+'\n\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
  showToast('CSV: '+fname,'ok');
}
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'ok');t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}
function showAutoBadge(){
  const b=document.getElementById('auto-badge');b.style.display='block';
  setTimeout(()=>b.style.display='none',2500);
}
</script>
